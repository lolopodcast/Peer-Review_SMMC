const apiFetch = async (payload) => {
  if (!window.CLOUD_GAS_URL) throw new Error("未設定雲端 GAS URL");
  const res = await fetch(window.CLOUD_GAS_URL, {
    method: 'POST',
    redirect: 'follow', 
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || "API 錯誤");
  return data;
};

// ─── 新版 GAS 雙向雲端腳本 (REST API) ───
const GAS_SCRIPT = `/**
 * Peer Evaluation System — Cloud Backend
 * 雙向雲端資料庫與發信系統
 */

function onOpen() {
  SpreadsheetApp.getUi().createMenu('📋 Peer Eval')
    .addItem('📧 寄出登入碼 Send Codes', 'sendLoginCodes')
    .addItem('⏰ 催繳未交者 Send Reminders', 'sendReminders')
    .addToUi();
}

function initSheets() {
  const ss = SpreadsheetApp.getActive();
  ['Roster', 'Criteria', 'Submissions', 'Settings'].forEach(name => {
    if (!ss.getSheetByName(name)) ss.insertSheet(name);
  });
}

function doPost(e) {
  initSheets();
  const ss = SpreadsheetApp.getActive();
  const output = { ok: false };

  try {
    const data = JSON.parse(e.postData.contents);
    const action = data.action;

    // ─── 遠端發信 API ───
    if (action === 'send_codes' || action === 'send_reminders') {
      const sets = ss.getSheetByName('Settings').getDataRange().getValues();
      let users = [];
      for(let i=1; i<sets.length; i++) {
        if(sets[i][0] === 'users') { try { users = JSON.parse(sets[i][1]); } catch(e){} }
      }
      const validUser = users.find(u => u.password === data.pw);
      if (!validUser) throw new Error('Unauthorized');
      
      output.message = action === 'send_codes' ? doSendLoginCodes() : doSendReminders();
      output.ok = true;
      return ContentService.createTextOutput(JSON.stringify(output)).setMimeType(ContentService.MimeType.JSON);
    }

    if (action === 'push_setup') {
      const rSheet = ss.getSheetByName('Roster');
      rSheet.clear();
      rSheet.appendRow(['student_id', 'name_zh', 'name_en', 'email', 'group', 'code']);
      data.students.forEach(s => rSheet.appendRow([s.student_id, s.name_zh, s.name_en, s.email, s.group, s.code]));

      const cSheet = ss.getSheetByName('Criteria');
      cSheet.clear();
      cSheet.appendRow(['id', 'name_zh', 'name_en', 'desc_zh', 'desc_en']);
      data.criteria.forEach(c => cSheet.appendRow([c.id, c.name_zh, c.name_en, c.desc_zh, c.desc_en]));

      const sSheet = ss.getSheetByName('Settings');
      sSheet.clear();
      sSheet.appendRow(['key', 'value']);
      sSheet.appendRow(['users', JSON.stringify(data.users || [])]);
      sSheet.appendRow(['assignment', data.assignment || '']);
      sSheet.appendRow(['deadline', data.deadline || '']);
      sSheet.appendRow(['eval_url', data.evalUrl || '']);
      
      output.ok = true;
    } 
    else if (action === 'login') {
      const code = String(data.code).trim();
      const roster = ss.getSheetByName('Roster').getDataRange().getValues();
      let user = null;
      
      for(let i=1; i<roster.length; i++) {
        if(String(roster[i][5]).trim() === code) {
          user = { student_id: String(roster[i][0]), name_zh: roster[i][1], name_en: roster[i][2], group: roster[i][4] };
          break;
        }
      }
      if (!user) throw new Error('Invalid login code (登入碼無效)');

      const subs = ss.getSheetByName('Submissions').getDataRange().getValues();
      for(let i=1; i<subs.length; i++) {
        if(String(subs[i][0]) === user.student_id) throw new Error('Already submitted (您已完成互評)');
      }

      const groupMembers = [];
      for(let i=1; i<roster.length; i++) {
        if(String(roster[i][4]) === String(user.group)) {
          groupMembers.push({ student_id: String(roster[i][0]), name_zh: roster[i][1], name_en: roster[i][2], group: roster[i][4] });
        }
      }

      const crits = ss.getSheetByName('Criteria').getDataRange().getValues();
      const criteria = [];
      for(let i=1; i<crits.length; i++) {
        criteria.push({ id: crits[i][0], name_zh: crits[i][1], name_en: crits[i][2], desc_zh: crits[i][3], desc_en: crits[i][4] });
      }

      const sets = ss.getSheetByName('Settings').getDataRange().getValues();
      let assignment = '';
      for(let i=1; i<sets.length; i++) {
        if(sets[i][0] === 'assignment') assignment = sets[i][1];
      }

      output.ok = true;
      output.user = user;
      output.groupMembers = groupMembers;
      output.criteria = criteria;
      output.assignment = assignment;
    }
    else if (action === 'submit') {
      const sid = String(data.student_id);
      const payload = JSON.stringify(data.evaluations);
      ss.getSheetByName('Submissions').appendRow([sid, payload, new Date().toISOString()]);
      output.ok = true;
    }
    // ─── TA / Admin 雲端登入與資料同步 ───
    else if (action === 'admin_login' || action === 'admin_sync') {
      const sets = ss.getSheetByName('Settings').getDataRange().getValues();
      let users = [];
      let assignment = '', deadline = '', evalUrl = '';
      for(let i=1; i<sets.length; i++) {
        if(sets[i][0] === 'users') { try { users = JSON.parse(sets[i][1]); } catch(e){} }
        if(sets[i][0] === 'assignment') assignment = sets[i][1];
        if(sets[i][0] === 'deadline') deadline = sets[i][1];
        if(sets[i][0] === 'eval_url') evalUrl = sets[i][1];
      }

      let user = null;
      if (action === 'admin_login') {
        const uid = String(data.uid || '').trim();
        const pw = String(data.pw || '').trim();
        if (users.length === 0) users = [{id:'prof',role:'professor',name:'Prof. Lo'}]; 
        
        user = users.find(u => u.id === uid && u.password === pw);
        if (!user && users.find(u => u.role === 'professor' && u.password === pw)) {
           user = users.find(u => u.role === 'professor' && u.password === pw);
        }
        if (!user) throw new Error('帳號或密碼錯誤 (Invalid credentials)');
      } else {
        const pw = String(data.pw || '').trim();
        if (!users.find(u => u.password === pw)) throw new Error('Unauthorized');
      }

      const rosterRaw = ss.getSheetByName('Roster') ? ss.getSheetByName('Roster').getDataRange().getValues() : [];
      const students = []; const codes = {};
      for(let i=1; i<rosterRaw.length; i++) {
         const sid = String(rosterRaw[i][0]);
         students.push({ student_id: sid, name_zh: rosterRaw[i][1], name_en: rosterRaw[i][2], email: rosterRaw[i][3], group: rosterRaw[i][4] });
         codes[sid] = String(rosterRaw[i][5]);
      }

      const critsRaw = ss.getSheetByName('Criteria') ? ss.getSheetByName('Criteria').getDataRange().getValues() : [];
      const criteria = [];
      for(let i=1; i<critsRaw.length; i++) {
         criteria.push({ id: critsRaw[i][0], name_zh: critsRaw[i][1], name_en: critsRaw[i][2], desc_zh: critsRaw[i][3], desc_en: critsRaw[i][4] });
      }

      const subsRaw = ss.getSheetByName('Submissions') ? ss.getSheetByName('Submissions').getDataRange().getValues() : [];
      const submissions = {};
      for(let i=1; i<subsRaw.length; i++) {
         if(subsRaw[i][0] && subsRaw[i][1]) {
            try { submissions[String(subsRaw[i][0])] = JSON.parse(subsRaw[i][1]); } catch(e){}
         }
      }

      output.ok = true;
      if (user) output.user = user;
      output.users = users;
      output.students = students;
      output.codes = codes;
      output.criteria = criteria;
      output.submissions = submissions;
      output.assignment = assignment;
      output.deadline = deadline;
      output.evalUrl = evalUrl;
    }
  } catch (err) {
    output.ok = false;
    output.error = err.message;
  }
  return ContentService.createTextOutput(JSON.stringify(output)).setMimeType(ContentService.MimeType.JSON);
}

// 安全的剪貼簿複製函式 (支援 iframe/無 Secure Context 的環境)
function copyTextToClipboard(text, onSuccess) {
  const fallbackCopy = (txt) => {
    const el = document.createElement('textarea');
    el.value = txt;
    el.setAttribute('readonly', '');
    el.style.position = 'absolute';
    el.style.left = '-9999px';
    document.body.appendChild(el);
    el.select();
    try { document.execCommand('copy'); } catch(e) { console.error('Fallback copy failed', e); }
    document.body.removeChild(el);
    if(onSuccess) onSuccess();
  };
  
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text)
      .then(() => { if(onSuccess) onSuccess(); })
      .catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

const EMAIL_DOMAIN = '@mail1.ncnu.edu.tw';

async function parseRosterFile(file) {
  const name = file.name.toLowerCase();
  const ext = name.split('.').pop();
  if (ext === 'csv' || ext === 'tsv') {
    return parseCSVText(await file.text(), ext === 'tsv' ? '\t' : ',');
  }
  if (ext === 'xlsx' || ext === 'xls') {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
    return normalizeRows(rows);
  }
  if (ext === 'docx') {
    const buf = await file.arrayBuffer();
    const result = await mammoth.extractRawText({arrayBuffer: buf});
    return parseTextToRoster(result.value);
  }
  if (ext === 'pdf') {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: buf}).promise;
    const allItems = [];
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const tc = await page.getTextContent();
      tc.items.forEach(item => {
        if (!item.str || !item.str.trim()) return;
        allItems.push({ text: item.str, x: Math.round(item.transform[4]), y: Math.round(item.transform[5]), page: i });
      });
    }
    allItems.sort((a,b) => b.y - a.y || a.x - b.x);
    const lines = [];
    let currentLine = [];
    let currentY = null;
    allItems.forEach(item => {
      if (currentY === null || Math.abs(item.y - currentY) <= 6) {
        currentLine.push(item);
        if (currentY === null) currentY = item.y;
      } else {
        if (currentLine.length > 0) {
          currentLine.sort((a,b) => a.x - b.x);
          lines.push(currentLine.map(it => it.text).join(' '));
        }
        currentLine = [item];
        currentY = item.y;
      }
    });
    if (currentLine.length > 0) {
      currentLine.sort((a,b) => a.x - b.x);
      lines.push(currentLine.map(it => it.text).join(' '));
    }
    return parsePdfLines(lines);
  }
  if (ext === 'txt') {
    const text = await file.text();
    return parseTextToRoster(text);
  }
  throw new Error('不支援的檔案格式：' + ext);
}

function parseCSVText(text, sep=',') {
  const lines = text.trim().split('\n').filter(l=>l.trim());
  if (lines.length < 2) return [];
  const header = lines[0].split(sep).map(h=>h.trim().toLowerCase().replace(/^["']|["']$/g,''));
  const rows = [];
  for (let i=1;i<lines.length;i++){
    const cols = lines[i].split(sep).map(c=>c.trim().replace(/^["']|["']$/g,''));
    const obj = {};
    header.forEach((h,idx) => obj[h] = cols[idx] || '');
    rows.push(obj);
  }
  return normalizeRows(rows);
}

function normalizeRows(rows) {
  const colDefs = {
    student_id: { exact: ['student_id','studentid','id','學號','sid','no','number','sno','stdid','std_id','stuid','stu_id'], partial: ['學號','stdno','stuno','student','stuId'], regex: /^(s?tu(dent)?[_\s]?(id|no|num))|學號|id$/i },
    dept: { exact: ['dept','department','系所','系級','系所年級','科系','系別','class','grade','年級','系所班級','deptgrade','dept_grade'], partial: ['系所','系級','年級','科系','系別','dept','department','class','grade','major'], regex: /系|級|dept|department|major|class|grade/i },
    name_zh: { exact: ['name_zh','namezh','chinese_name','中文姓名','姓名','名字','name_chinese','中文名','cname','chname','ch_name','中文'], partial: ['中文','chinese','姓名','名字','cname'], regex: /中文|chinese|姓名|^名/i },
    name_en: { exact: ['name_en','nameen','english_name','英文姓名','英文名','name_english','ename','enname','en_name','英文','english'], partial: ['英文','english','ename','enname'], regex: /英文|english|^en[_\s]?name/i },
    email: { exact: ['email','e-mail','mail','電子郵件','信箱','電郵','e_mail','emailaddress','email_address'], partial: ['email','mail','信箱','電郵'], regex: /e?-?mail|信箱|電郵/i },
    group: { exact: ['group','grp','team','組別','小組','分組','group_name','groupname','組','team_name','teamname','group_no'], partial: ['組','group','team','grp'], regex: /組|group|team|grp/i }
  };

  function findCol(obj, fieldName) {
    const def = colDefs[fieldName];
    const keys = Object.keys(obj);
    const norm = s => s.toLowerCase().replace(/[_\s\-\.]/g, '');
    for (const candidate of def.exact) { const found = keys.find(k => norm(k) === norm(candidate)); if (found) return obj[found]; }
    for (const candidate of def.partial) { const found = keys.find(k => norm(k).includes(norm(candidate)) || norm(candidate).includes(norm(k))); if (found) return obj[found]; }
    if (def.regex) { const found = keys.find(k => def.regex.test(k)); if (found) return obj[found]; }
    return '';
  }

  return rows.map(r => {
    const sid = String(findCol(r, 'student_id')).trim();
    const manualEmail = String(findCol(r, 'email')).trim();
    let nameZh = String(findCol(r, 'name_zh')).trim();
    let nameEn = String(findCol(r, 'name_en')).trim();

    if (!nameZh || !nameEn) {
      const keys = Object.keys(r);
      const genericNameKey = keys.find(k => /^name$|^姓名$/i.test(k.trim()));
      if (genericNameKey) {
        const val = String(r[genericNameKey]).trim();
        const hasChinese = /[\u4e00-\u9fff]/.test(val);
        const hasLatin = /[a-zA-Z]{2,}/.test(val);
        if (!nameZh && hasChinese) nameZh = val;
        if (!nameEn && hasLatin) nameEn = val;
        if (!nameZh && !hasChinese) nameZh = val;
        if (!nameEn && !hasLatin) nameEn = val;
      }
    }

    return {
      student_id: sid,
      dept: String(findCol(r, 'dept')).trim(),
      name_zh: nameZh,
      name_en: nameEn,
      email: manualEmail || (sid ? autoEmail(sid) : ''),
      group: String(findCol(r, 'group')).trim()
    };
  }).filter(r => r.student_id && r.group);
}

function parsePdfLines(lines) {
  const headerRe = /(學號|student.?id|sid).*(姓名|name).*(組|group)/i;
  const headerRe2 = /(系所|dept).*(學號|sid|id)/i;
  let headerIdx = -1;
  for (let i = 0; i < Math.min(lines.length, 20); i++) {
    if (headerRe.test(lines[i]) || headerRe2.test(lines[i])) { headerIdx = i; break; }
  }

  const students = [];
  const sidRe = /\b(\d{9,12})\b/;

  for (let i = (headerIdx >= 0 ? headerIdx + 1 : 0); i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const sidMatch = line.match(sidRe);
    if (!sidMatch) continue;

    const sid = sidMatch[1];
    const sidPos = line.indexOf(sid);
    const beforeSid = line.substring(0, sidPos).trim();
    const afterSid = line.substring(sidPos + sid.length).trim();
    const groupMatch = afterSid.match(/\b(G\d+)\s*$/i);
    const group = groupMatch ? groupMatch[1] : '';
    const namesPart = groupMatch ? afterSid.substring(0, groupMatch.index).trim() : afterSid;

    let nameZh = '', nameEn = '';
    const zhMatch = namesPart.match(/^([\u4e00-\u9fff\u3400-\u4dbf]+)/);
    if (zhMatch) {
      nameZh = zhMatch[1];
      nameEn = namesPart.substring(zhMatch[0].length).trim();
    } else {
      const parts = namesPart.split(/\s+/);
      parts.forEach(p => {
        if (/[\u4e00-\u9fff]/.test(p)) nameZh += (nameZh ? '' : '') + p;
        else nameEn += (nameEn ? ' ' : '') + p;
      });
    }

    if (sid && group) {
      students.push({
        student_id: sid, dept: beforeSid, name_zh: nameZh.trim(), name_en: nameEn.trim(),
        email: autoEmail(sid), group: group.toUpperCase()
      });
    }
  }
  return students;
}

function parseTextToRoster(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const result = parsePdfLines(lines);
  if (result.length > 0) return result;

  const parsed = [];
  for (const line of lines) {
    let parts;
    if (line.includes('\t')) parts = line.split('\t');
    else if (line.includes(',')) parts = line.split(',');
    else continue;
    parts = parts.map(p => p.trim()).filter(Boolean);
    if (parts.length < 3) continue;

    const sidIdx = parts.findIndex(p => /^\d{9,12}$/.test(p));
    if (sidIdx < 0) continue;

    const sid = parts[sidIdx];
    const groupIdx = parts.findIndex((p,i) => i !== sidIdx && /^G\d+$/i.test(p));
    const group = groupIdx >= 0 ? parts[groupIdx] : parts[parts.length - 1];

    const otherParts = parts.filter((_, i) => i !== sidIdx && i !== groupIdx);
    let dept = '', nameZh = '', nameEn = '';
    otherParts.forEach(p => {
      if (/[\u4e00-\u9fff].*[系班級]/.test(p)) dept = p;
      else if (/[\u4e00-\u9fff]/.test(p) && !nameZh) nameZh = p;
      else if (/[a-zA-Z]/.test(p) && !nameEn) nameEn = p;
    });

    parsed.push({
      student_id: sid, dept, name_zh: nameZh, name_en: nameEn, email: autoEmail(sid), group: group
    });
  }
  return parsed;
}

async function extractCriteriaFromFile(file) {
  const name = file.name.toLowerCase();
  const ext = name.split('.').pop();
  let text = '';

  if (ext === 'csv' || ext === 'tsv' || ext === 'txt') {
    text = await file.text();
  } else if (ext === 'xlsx' || ext === 'xls') {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array'});
    text = XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]]);
  } else if (ext === 'docx') {
    const buf = await file.arrayBuffer();
    text = (await mammoth.extractRawText({arrayBuffer: buf})).value;
  } else if (ext === 'pdf') {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: buf}).promise;
    for (let i = 1; i <= Math.min(pdf.numPages, 3); i++) {
      const page = await pdf.getPage(i);
      text += (await page.getTextContent()).items.map(it => it.str).join(' ') + '\n';
    }
  }

  const criteria = extractCriteriaLocal(text);
  if (criteria.length > 0) return criteria;
  return [];
}

function extractCriteriaLocal(text) {
  const criteria = [];
  const seen = new Set();
  const ecPattern = /(?:[ivx]+\.\s*)?EC(\d+)\s*[：:]\s*(.+?)(?:的排名|的排序)[。.]?/gi;
  let match;
  while ((match = ecPattern.exec(text)) !== null) {
    const num = match[1];
    if (seen.has(num)) continue;
    seen.add(num);
    let desc = match[2].trim().replace(/^該組員在?/,'').replace(/^每次參與小組討論時[，,]?\s*/,'');
    const enMap = { '準備充分程度': 'Preparation Level', '準備充分': 'Preparation', '切中要點或有創意貢獻': 'Insight & Creative Contribution', '切中要點': 'Insight', '積極帶領討論或充份合作': 'Leadership & Collaboration', '帶領討論': 'Discussion Leadership', '書面報告整理與撰寫': 'Written Report Contribution', '主 ব্যথা且具體貢獻': 'Proactive Contribution', '團隊士氣或討論氣氛': 'Team Morale & Atmosphere', '正面且顯著提升': 'Positive Impact' };
    let nameEn = 'EC' + num, descEn = '', zhShortMap = {};
    for (const [zh, en] of Object.entries(enMap)) {
      if (desc.includes(zh)) { nameEn = en; descEn = en + ' ranking'; zhShortMap.short = zh; break; }
    }
    const nameZh = zhShortMap.short || (desc.length > 12 ? desc.substring(0, 10) + '…' : desc);
    criteria.push({ id: 'ec' + num + '_' + Date.now(), name_zh: 'EC' + num + ' ' + nameZh, name_en: 'EC' + num + ' ' + nameEn, desc_zh: '該組員' + (desc.startsWith('能') || desc.startsWith('對') ? '' : '在每次參與小組討論時，') + desc, desc_en: descEn || nameEn });
  }
  if (criteria.length > 0) return criteria;

  const numberedPattern = /(?:^|\n)\s*(\d+)\s*[.、)）]\s*(.{4,60})/gm;
  const candidates = [];
  while ((match = numberedPattern.exec(text)) !== null) {
    const desc = match[2].trim();
    if (/評|貢獻|表現|合作|能力|quality|contribution|effort|collaboration/i.test(desc)) candidates.push(desc);
  }
  if (candidates.length >= 2) {
    return candidates.map((desc, i) => ({ id: 'cr' + (i+1) + '_' + Date.now(), name_zh: desc.substring(0, 20), name_en: 'Criterion ' + (i + 1), desc_zh: desc, desc_en: '' }));
  }
  return [];
}

const RankingBoard=({members,currentUser,lang,onRankingChange,existingRanking})=>{
  const t=dict[lang];const gs=members.length;
  const[slots,setSlots]=useState(()=>{
    const s={};for(let i=1;i<=gs;i++)s[i]=[];s['pool']=[];
    if(existingRanking&&Object.keys(existingRanking).length>0){
      const placed=new Set();
      Object.entries(existingRanking).forEach(([m,r])=>{if(s[r]){s[r].push(m);placed.add(m)}});
      members.forEach(m=>{if(!placed.has(m.student_id))s['pool'].push(m.student_id)});
    }else{s['pool']=members.map(m=>m.student_id)}
    return s;
  });
  const[dragItem,setDragItem]=useState(null);
  const[dragOverSlot,setDragOverSlot]=useState(null);
  const ghostRef=useRef(null);
  const memberMap=useMemo(()=>{const m={};members.forEach(s=>m[s.student_id]=s);return m},[members]);

  useEffect(()=>{
    const ranking={};
    Object.entries(slots).forEach(([slot,ids])=>{if(slot!=='pool')ids.forEach(id=>ranking[id]=parseInt(slot))});
    onRankingChange(slots['pool'].length===0?ranking:null);
  },[slots]);

  const moveItem=useCallback((itemId,from,to)=>{
    if(from===to)return;
    setSlots(prev=>{
      const next={};Object.keys(prev).forEach(k=>{next[k]=[...prev[k]]});
      next[from]=next[from].filter(id=>id!==itemId);
      if(!next[to])next[to]=[];
      next[to].push(itemId);
      return next;
    });
  },[]);

  const handleDragStart=(e,mid,from)=>{setDragItem({mid,from});e.dataTransfer.effectAllowed='move';e.target.classList.add('dragging')};
  const handleDragEnd=(e)=>{e.target.classList.remove('dragging');setDragItem(null);setDragOverSlot(null)};
  const handleDragOver=(e,sk)=>{e.preventDefault();e.dataTransfer.dropEffect='move';setDragOverSlot(sk)};
  const handleDragLeave=()=>setDragOverSlot(null);
  const handleDrop=(e,to)=>{e.preventDefault();setDragOverSlot(null);if(dragItem)moveItem(dragItem.mid,dragItem.from,to)};

  const handleTouchStart=(e,mid,from)=>{
    const touch=e.touches[0];setDragItem({mid,from});
    const g=document.createElement('div');
    const m=memberMap[mid];g.textContent=lang==='zh'?m.name_zh:m.name_en;
    g.style.cssText=`position:fixed;z-index:9999;pointer-events:none;padding:8px 16px;background:#004030;color:#D8C3A5;border-radius:8px;font-size:14px;font-weight:600;transform:translate(-50%,-50%);left:${touch.clientX}px;top:${touch.clientY}px;`;
    document.body.appendChild(g);ghostRef.current=g;
  };
  const handleTouchMove=(e)=>{
    e.preventDefault();const touch=e.touches[0];
    if(ghostRef.current){ghostRef.current.style.left=touch.clientX+'px';ghostRef.current.style.top=touch.clientY+'px'}
    const el=document.elementFromPoint(touch.clientX,touch.clientY);
    if(el){const se=el.closest('[data-slot]');setDragOverSlot(se?se.dataset.slot:null)}
  };
  const handleTouchEnd=()=>{
    if(ghostRef.current){document.body.removeChild(ghostRef.current);ghostRef.current=null}
    if(dragItem&&dragOverSlot!==null)moveItem(dragItem.mid,dragItem.from,dragOverSlot==='pool'?'pool':dragOverSlot);
    setDragItem(null);setDragOverSlot(null);
  };

  const renderChip=(mid,sk)=>{
    const m=memberMap[mid];if(!m)return null;
    const self=mid===currentUser;
    const dn=lang==='zh'?`${m.name_zh} (${m.name_en})`:`${m.name_en} (${m.name_zh})`;
    return(<div key={mid} draggable onDragStart={e=>handleDragStart(e,mid,sk)} onDragEnd={handleDragEnd}
      onTouchStart={e=>handleTouchStart(e,mid,sk)} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}
      className={`member-chip inline-flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium border
        ${self?'bg-[#004030]/10 dark:bg-[#D8C3A5]/10 border-[#004030]/30 dark:border-[#D8C3A5]/30 text-[#004030] dark:text-[#D8C3A5]'
        :'bg-white dark:bg-slate-700 border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-200'} shadow-sm hover:shadow-md`}>
      <span>{dn}</span>{self&&<span className="text-xs opacity-60">{t.eval_self_note}</span>}
    </div>);
  };

  const badgeCls=r=>r===1?'rank-1':r===2?'rank-2':r===3?'rank-3':'rank-other';

  return(<div className="space-y-4">
    <div data-slot="pool" onDragOver={e=>handleDragOver(e,'pool')} onDragLeave={handleDragLeave} onDrop={e=>handleDrop(e,'pool')}
      className={`rank-slot p-4 rounded-xl border-2 border-dashed transition-all ${dragOverSlot==='pool'?'drag-over border-[#004030] dark:border-[#D8C3A5]':'border-slate-300 dark:border-slate-600'} bg-slate-50 dark:bg-slate-800/50`}>
      <p className="text-xs font-semibold text-slate-400 dark:text-slate-500 mb-2 uppercase tracking-wider">{t.eval_pool}</p>
      <div className="flex flex-wrap gap-2 min-h-[40px]">
        {slots['pool'].map(id=>renderChip(id,'pool'))}
        {slots['pool'].length===0&&<span className="text-xs text-slate-400 italic">{lang==='zh'?'全部已排序 ✓':'All ranked ✓'}</span>}
      </div>
    </div>
    <div className="grid gap-2">
      {Array.from({length:gs},(_,i)=>i+1).map(rank=>(
        <div key={rank} data-slot={String(rank)} onDragOver={e=>handleDragOver(e,String(rank))} onDragLeave={handleDragLeave} onDrop={e=>handleDrop(e,String(rank))}
          className={`rank-slot flex items-center gap-3 p-3 rounded-xl border-2 transition-all ${dragOverSlot===String(rank)?'drag-over border-[#004030] dark:border-[#D8C3A5]':'border-slate-200 dark:border-slate-700'} bg-white dark:bg-slate-800`}>
          <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm shrink-0 ${badgeCls(rank)}`}>{rank}</div>
          <div className="flex flex-wrap gap-2 flex-1 min-h-[36px]">{(slots[rank]||[]).map(id=>renderChip(id,String(rank)))}</div>
        </div>
      ))}
    </div>
  </div>);
};

      const students=await parseRosterFile(file);
      if(students.length===0)throw new Error('No valid student rows found');
      const newGroups = [...new Set(students.map(s=>s.group))];
      const gs = {...store.groupScores};
      newGroups.forEach(g => { if(!gs[g]) gs[g] = '1'; });
      updateStore({students, groupScores: gs});
      setParseMsg({ok:true,n:students.length,g:newGroups.length});
    }catch(err){setParseMsg({ok:false,e:err.message})}
    finally{setParsing(false)}
  };

  const handleCriteriaImport=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    setCriteriaImporting(true);
    try{
      const criteria=await extractCriteriaFromFile(file);
      if(criteria.length>0){
        const withIds=criteria.map((c,i)=>({...c,id:'ci'+Date.now()+i}));
        updateStore({criteria:withIds});
      }
    }catch(err){console.error('Criteria import error:',err)}
    finally{setCriteriaImporting(false);e.target.value=''}
  };

  const addCriterion=()=>{updateStore({criteria:[...store.criteria,{id:'c'+Date.now(),name_zh:'',name_en:'',desc_zh:'',desc_en:''}]})};
  const removeCriterion=id=>{updateStore({criteria:store.criteria.filter(c=>c.id!==id)})};
  const updateCriterion=(id,f,v)=>{updateStore({criteria:store.criteria.map(c=>c.id===id?{...c,[f]:v}:c)})};

  const handleGenerateCodes=()=>{const codes={};store.students.forEach(s=>{codes[s.student_id]=generateCode(10)});updateStore({codes})};
  
  const handleCopyCodesForGAS=()=>{
    let tsv='student_id\tname_zh\tname_en\temail\tgroup\tcode\tstatus\n';
    store.students.forEach(s=>{
      const code=store.codes[s.student_id]||'';
      const status=store.submissions[s.student_id]?'submitted':'pending';
      tsv+=`${s.student_id}\t${s.name_zh}\t${s.name_en}\t${s.email}\t${s.group}\t${code}\t${status}\n`;
    });
    
    copyTextToClipboard(tsv, () => {
      setCodeCopied(true);
      setTimeout(()=>setCodeCopied(false),2000);
    });
  };

  const computeResults=useMemo(()=>{
    if(!store.students.length||!Object.keys(store.submissions).length)return null;
    const results={};
    groupNames.forEach(gName=>{
      const members=groups[gName];const mr={};
      members.forEach(m=>{
        let tr=0,rc=0;
        Object.entries(store.submissions).forEach(([eid,cr])=>{
          const ev=store.students.find(s=>s.student_id===eid);
          if(!ev||ev.group!==gName)return;
          store.criteria.forEach(c=>{const ranks=cr[c.id];if(ranks&&ranks[m.student_id]!==undefined){tr+=ranks[m.student_id];rc++}});
        });
        const avg=rc>0?tr/rc:members.length/2;
        const pct=rankToPercentile(avg,members.length);
        const w=percentileToWeight(pct,store.weightMin,store.weightMax);
        const gs=parseFloat(store.groupScores[gName])||0;
        const cd={};
        store.criteria.forEach(c=>{let ct=0,cc=0;
          Object.entries(store.submissions).forEach(([eid,cr])=>{const ev=store.students.find(s=>s.student_id===eid);if(!ev||ev.group!==gName)return;const ranks=cr[c.id];if(ranks&&ranks[m.student_id]!==undefined){ct+=ranks[m.student_id];cc++}});
          cd[c.id]=cc>0?Math.round(ct/cc*100)/100:'-';
        });
        mr[m.student_id]={student:m,avgRank:Math.round(avg*100)/100,percentile:Math.round(pct*100),weight:Math.round(w*100)/100,groupScore:gs,finalScore:Math.round(gs*w*100)/100,criterionDetail:cd};
      });
      results[gName]={members:mr,submitted:members.filter(m=>store.submissions[m.student_id]).length,total:members.length};
    });
    return results;
  },[store,groupNames,groups]);

  const handleExportResults=()=>{
    if(!computeResults)return;
    let csv='group,student_id,name_zh,name_en,avg_rank,percentile,weight_factor,group_score,final_score';
    store.criteria.forEach(c=>csv+=`,${c.name_en}_avg`);csv+='\n';
    groupNames.forEach(gn=>{const gr=computeResults[gn];if(!gr)return;
      Object.values(gr.members).forEach(r=>{
        csv+=`${gn},${r.student.student_id},${r.student.name_zh},${r.student.name_en},${r.avgRank},${r.percentile}%,${r.weight},${r.groupScore},${r.finalScore}`;
        store.criteria.forEach(c=>csv+=`,${r.criterionDetail[c.id]}`);csv+='\n';
      });
    });
    downloadCSV('peer_eval_results.csv',csv);
  };

                <label className="inline-flex items-center gap-1.5 px-2 sm:px-3 py-1 sm:py-1.5 text-[10px] sm:text-xs font-medium border border-dashed border-[#004030]/30 dark:border-[#D8C3A5]/30 rounded-lg text-[#004030] dark:text-[#D8C3A5] hover:bg-[#004030]/5 dark:hover:bg-[#D8C3A5]/5 cursor-pointer transition">
                  <IconFile size={14}/>{criteriaImporting?(t.setup_criteria_importing):t.setup_criteria_import}
                  <input type="file" accept=".csv,.tsv,.xlsx,.xls,.docx,.pdf,.txt" onChange={handleCriteriaImport} className="hidden"/>
                </label>
              </div>
              <p className="text-[10px] sm:text-xs text-slate-400 mb-4">{t.setup_criteria_import_desc}</p>
              <div className="space-y-3 sm:space-y-4">
                {store.criteria.map((c,idx)=>(
                  <div key={c.id} className="p-3 sm:p-4 bg-slate-50 dark:bg-slate-700/50 rounded-xl border border-slate-200 dark:border-slate-600">
                    <div className="flex justify-between items-start mb-2 sm:mb-3">
                      <span className="font-bold text-[#004030] dark:text-[#D8C3A5] text-xs sm:text-sm">#{idx+1}</span>
                      {isProf&&<button onClick={()=>removeCriterion(c.id)} className="text-red-400 hover:text-red-600 text-[10px] sm:text-xs">{t.setup_remove}</button>}
                    </div>
                    <div className="space-y-2">
                      <div>
                        <label className="text-[10px] sm:text-xs text-slate-400 mb-0.5 block">{lang==='zh'?'名稱':'Name'}</label>
                        <input key={c.id+'name'+lang} defaultValue={lang==='zh'?c.name_zh:c.name_en}
                          onBlur={e=>updateCriterion(c.id,lang==='zh'?'name_zh':'name_en',e.target.value)}
                          placeholder={lang==='zh'?t.setup_criterion_zh:t.setup_criterion_en}
                          className="w-full px-2 sm:px-3 py-1.5 sm:py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-xs sm:text-sm focus:ring-2 focus:ring-[#004030] focus:outline-none text-slate-800 dark:text-slate-200"/>
                      </div>
                      <div>
                        <label className="text-[10px] sm:text-xs text-slate-400 mb-0.5 block">{lang==='zh'?'說明（Rubric）':'Description (Rubric)'}</label>
                        <input key={c.id+'desc'+lang} defaultValue={lang==='zh'?c.desc_zh:c.desc_en}
                          onBlur={e=>updateCriterion(c.id,lang==='zh'?'desc_zh':'desc_en',e.target.value)}
                          placeholder={lang==='zh'?t.setup_criterion_desc_zh:t.setup_criterion_desc_en}
                          className="w-full px-2 sm:px-3 py-1.5 sm:py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-xs sm:text-sm focus:ring-2 focus:ring-[#004030] focus:outline-none text-slate-800 dark:text-slate-200"/>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              <button onClick={addCriterion} className="mt-4 px-4 py-2 border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-xl text-xs sm:text-sm text-slate-500 hover:border-[#004030] hover:text-[#004030] dark:hover:border-[#D8C3A5] dark:hover:text-[#D8C3A5] transition w-full">{t.setup_add_criterion}</button>
            </div>

            <div className="bg-white dark:bg-slate-800 rounded-2xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700">
              <h3 className="font-serif font-bold text-base sm:text-lg text-[#004030] dark:text-[#D8C3A5] mb-3">{t.setup_weight_range}</h3>
              <div className="flex gap-2 sm:gap-4 items-center">
                <div><label className="text-[10px] sm:text-xs text-slate-500 mb-1 block">{t.setup_weight_min}</label>
                  <input type="number" step="0.05" defaultValue={store.weightMin} onBlur={e=>updateStore({weightMin:parseFloat(e.target.value)||0.55})}
                    className="w-20 sm:w-24 px-2 sm:px-3 py-1.5 sm:py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-xs sm:text-sm text-center font-mono text-slate-800 dark:text-slate-200 focus:ring-2 focus:ring-[#004030] focus:outline-none"/></div>
                <span className="text-slate-400 text-base sm:text-lg mt-4 sm:mt-5">~</span>
                <div><label className="text-[10px] sm:text-xs text-slate-500 mb-1 block">{t.setup_weight_max}</label>
                  <input type="number" step="0.05" defaultValue={store.weightMax} onBlur={e=>updateStore({weightMax:parseFloat(e.target.value)||1.45})}
                    className="w-20 sm:w-24 px-2 sm:px-3 py-1.5 sm:py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-xs sm:text-sm text-center font-mono text-slate-800 dark:text-slate-200 focus:ring-2 focus:ring-[#004030] focus:outline-none"/></div>
              </div>
            </div>

            <button onClick={()=>{saveStore(store);setSavedMsg(t.setup_saved);setTimeout(()=>setSavedMsg(''),2000)}}
              className="w-full py-3 sm:py-4 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold text-sm sm:text-base rounded-xl hover:opacity-90 transition shadow-md">{t.setup_save}</button>
            {savedMsg&&<p className="text-center text-green-600 dark:text-green-400 text-xs sm:text-sm">{savedMsg}</p>}
          </div>}

          {adminTab==='codes'&&<div className="space-y-4">
            <div className="flex flex-col sm:flex-row flex-wrap gap-3">
              <button onClick={handleGenerateCodes} className="flex-1 sm:flex-none justify-center px-4 py-2.5 bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 font-bold rounded-xl hover:bg-slate-300 transition flex items-center gap-2 text-xs sm:text-sm"><IconRefresh size={16}/>{t.codes_generate}</button>
              
              {!isCloudMode ? (
                <button onClick={handleCopyCodesForGAS} className="flex-1 sm:flex-none justify-center px-4 py-2.5 border-2 border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] font-bold rounded-xl hover:bg-[#004030]/5 transition flex items-center gap-2 text-xs sm:text-sm">
                  <IconCopy size={16}/>{codeCopied?t.codes_copy_done:t.codes_export_gas}
                </button>
              ) : (
                <button onClick={handlePushToCloud} disabled={pushStatus==='pushing'}
                  className={`flex-1 sm:flex-none justify-center px-4 py-2.5 font-bold rounded-xl transition flex items-center gap-2 text-xs sm:text-sm shadow-md ${
                    pushStatus==='done'?'bg-green-600 text-white':
                    pushStatus==='pushing'?'bg-slate-300 text-slate-500 cursor-wait':
                    'bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] hover:opacity-90'
                  }`}>
                  <IconCloud size={16}/>
                  {pushStatus==='pushing'?t.codes_pushing:pushStatus==='done'?t.codes_push_done:pushStatus&&pushStatus.startsWith('error')?t.codes_push_error.replace('{e}',pushStatus.slice(6)):t.codes_push}
                </button>
              )}
            </div>
            
            {isCloudMode && (
              <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 rounded-xl p-4 sm:p-5 border border-[#004030]/20 dark:border-[#D8C3A5]/20 mt-2">
                 <h4 className="text-xs sm:text-sm font-bold text-[#004030] dark:text-[#D8C3A5] mb-3 flex items-center gap-2">
                    <IconMail size={16} className="sm:w-[18px] sm:h-[18px]"/> 雲端發信控制台 (遠端操作 GAS)
                 </h4>
                 <div className="flex flex-col sm:flex-row flex-wrap gap-2 sm:gap-3">
                   <button onClick={()=>handleCloudSendEmails('codes')} disabled={isSendingEmails}
                      className="flex-1 justify-center px-3 py-2 bg-white dark:bg-slate-800 border border-[#004030]/30 dark:border-[#D8C3A5]/30 text-[#004030] dark:text-[#D8C3A5] rounded-lg text-[11px] sm:text-sm font-medium hover:bg-[#004030]/10 transition flex items-center gap-2 disabled:opacity-50">
                      {isSendingEmails ? <IconSpinner size={14} className="sm:w-4 sm:h-4"/> : <IconMail size={14} className="sm:w-4 sm:h-4"/>}
                      {isSendingEmails ? t.codes_sending : t.codes_cloud_send}
                   </button>
                   <button onClick={()=>handleCloudSendEmails('reminders')} disabled={isSendingEmails}
                      className="flex-1 justify-center px-3 py-2 bg-amber-50 dark:bg-amber-900/30 border border-amber-300 dark:border-amber-700/50 text-amber-700 dark:text-amber-400 rounded-lg text-[11px] sm:text-sm font-medium hover:bg-amber-100 transition flex items-center gap-2 disabled:opacity-50">
                      {isSendingEmails ? <IconSpinner size={14} className="sm:w-4 sm:h-4"/> : <IconMail size={14} className="sm:w-4 sm:h-4"/>}
                      {isSendingEmails ? t.codes_sending : t.codes_cloud_remind}
                   </button>
                 </div>
              </div>
            )}

            {!isCloudMode && <div className="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800/30 rounded-xl p-3 sm:p-4 text-xs sm:text-sm text-red-800 dark:text-red-300">
              ⚠️ {lang==='zh'?'目前尚未填寫 GAS URL，無法使用雲端推送與自動寄信。請至「部署 & 雲端設定指南」查看教學。':'Cloud URL missing. Please check the Deploy Guide to enable cloud push and mailing.'}
            </div>}

            {store.students.length>0&&<div className="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 overflow-hidden w-full">
              <div className="overflow-x-auto hide-scrollbar w-full">
                <table className="w-full text-xs sm:text-sm min-w-[500px]">
                  <thead className="bg-[#004030] text-[#D8C3A5]">
                    <tr><th className="px-3 sm:px-4 py-2.5 sm:py-3 text-left font-medium">{t.codes_student}</th><th className="px-3 sm:px-4 py-2.5 sm:py-3 text-left font-medium">{t.codes_group}</th><th className="px-3 sm:px-4 py-2.5 sm:py-3 text-left font-medium font-mono">{t.codes_code}</th><th className="px-3 sm:px-4 py-2.5 sm:py-3 text-center font-medium">{t.codes_status}</th></tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100 dark:divide-slate-700">
                    {store.students.map(s=>(
                      <tr key={s.student_id} className="hover:bg-slate-50 dark:hover:bg-slate-700/50">
                        <td className="px-3 sm:px-4 py-2 sm:py-2.5 text-slate-700 dark:text-slate-300">{lang==='zh'?`${s.name_zh} (${s.name_en})`:`${s.name_en} (${s.name_zh})`}</td>
                        <td className="px-3 sm:px-4 py-2 sm:py-2.5 text-slate-500">{s.group}</td>
                        <td className="px-3 sm:px-4 py-2 sm:py-2.5 font-mono text-[10px] sm:text-xs text-slate-600 dark:text-slate-400">{store.codes[s.student_id]||'-'}</td>
                        <td className="px-3 sm:px-4 py-2 sm:py-2.5 text-center">
                          {store.submissions[s.student_id]
                            ?<span className="inline-flex items-center gap-1 px-1.5 sm:px-2 py-0.5 rounded-full bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 text-[10px] sm:text-xs font-medium"><IconCheck size={12}/>{t.codes_submitted}</span>
                            :<span className="inline-flex items-center gap-1 px-1.5 sm:px-2 py-0.5 rounded-full bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400 text-[10px] sm:text-xs font-medium">{t.codes_pending}</span>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>}
          </div>}

          {adminTab==='results'&&<div className="space-y-4">
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 sm:gap-0 bg-white dark:bg-slate-800 rounded-2xl p-4 border border-slate-200 dark:border-slate-700">
               <div>
                  <h3 className="font-bold text-[#004030] dark:text-[#D8C3A5] text-sm sm:text-base">{lang==='zh'?'雲端成績同步':'Sync Data'}</h3>
                  <p className="text-[10px] sm:text-xs text-slate-500">{lang==='zh'?'從 Google Sheets 拉取學生最新送出的互評結果':'Fetch latest peer evaluation results from Google Sheets'}</p>
               </div>
               <button onClick={handleSyncFromCloud} disabled={syncStatus==='syncing' || !isCloudMode}
                  className={`w-full sm:w-auto px-4 py-2 sm:py-2.5 font-bold rounded-xl transition flex justify-center items-center gap-2 text-xs sm:text-sm ${
                    syncStatus==='done'?'bg-green-600 text-white':
                    syncStatus==='syncing'?'bg-slate-300 text-slate-500 cursor-wait':
                    !isCloudMode?'bg-slate-200 text-slate-400 cursor-not-allowed':
                    'bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] hover:opacity-90'
                  }`}>
                  <IconCloud size={16}/>
                  {syncStatus==='syncing'?t.results_syncing:syncStatus==='done'?t.results_sync_done:t.results_sync_cloud}
               </button>
            </div>

            {!computeResults?<div className="bg-white dark:bg-slate-800 rounded-2xl p-12 text-center border border-slate-200 dark:border-slate-700"><IconBarChart size={48} className="mx-auto text-slate-300 dark:text-slate-600 mb-3"/><p className="text-slate-500 text-sm">{t.results_no_data}</p></div>
            :<>
              <div className="flex justify-end"><button onClick={handleExportResults} className="px-4 py-2 sm:py-2.5 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-xl hover:opacity-90 transition flex items-center gap-2 text-xs sm:text-sm"><IconDownload size={16}/>{t.results_export}</button></div>
              {groupNames.map(gName=>{
                const gr=computeResults[gName];if(!gr)return null;
                const sorted=Object.values(gr.members).sort((a,b)=>a.avgRank-b.avgRank);
                return(<div key={gName} className="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 overflow-hidden w-full">
                  <div className="px-4 sm:px-5 py-2.5 sm:py-3 bg-[#004030]/5 dark:bg-[#D8C3A5]/5 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center">
                    <h3 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] flex items-center gap-2 text-sm sm:text-base"><IconUsers size={16}/>{gName}</h3>
                    <span className="text-[10px] sm:text-xs text-slate-500">{t.results_submissions}: {gr.submitted}/{gr.total}</span>
                  </div>
                  <div className="overflow-x-auto hide-scrollbar w-full">
                    <table className="w-full text-[10px] sm:text-sm min-w-[600px]">
                      <thead className="bg-slate-50 dark:bg-slate-700/50">
                        <tr><th className="px-2 sm:px-4 py-2 text-left font-medium text-slate-600 dark:text-slate-300">{t.results_student}</th>
                          <th className="px-2 sm:px-4 py-2 text-center font-medium text-slate-600 dark:text-slate-300">{t.results_avg_rank}</th>
                          <th className="px-2 sm:px-4 py-2 text-center font-medium text-slate-600 dark:text-slate-300">{t.results_percentile}</th>
                          <th className="px-2 sm:px-4 py-2 text-center font-medium text-slate-600 dark:text-slate-300">{t.results_weight}</th>
                          <th className="px-2 sm:px-4 py-2 text-center font-medium text-slate-600 dark:text-slate-300">{t.results_group_score}</th>
                          <th className="px-2 sm:px-4 py-2 text-center font-medium text-slate-600 dark:text-slate-300">{t.results_final_score}</th></tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100 dark:divide-slate-700">
                        {sorted.map(r=>(
                          <tr key={r.student.student_id} className="hover:bg-slate-50 dark:hover:bg-slate-700/50">
                            <td className="px-2 sm:px-4 py-1.5 sm:py-2.5 text-slate-700 dark:text-slate-300">{lang==='zh'?`${r.student.name_zh} (${r.student.name_en})`:`${r.student.name_en} (${r.student.name_zh})`}</td>
                            <td className="px-2 sm:px-4 py-1.5 sm:py-2.5 text-center font-mono text-slate-600 dark:text-slate-400">{r.avgRank}</td>
                            <td className="px-2 sm:px-4 py-1.5 sm:py-2.5 text-center">
                              <div className="w-full bg-slate-200 dark:bg-slate-600 rounded-full h-1.5 sm:h-2 mx-auto max-w-[50px] sm:max-w-[80px]"><div className="bg-[#004030] dark:bg-[#D8C3A5] h-1.5 sm:h-2 rounded-full" style={{width:r.percentile+'%'}}/></div>
                              <span className="text-[9px] sm:text-xs text-slate-500">{r.percentile}%</span>
                            </td>
                            <td className="px-2 sm:px-4 py-1.5 sm:py-2.5 text-center font-mono font-bold text-[#004030] dark:text-[#D8C3A5]">{r.weight}×</td>
                            <td className="px-2 sm:px-4 py-1.5 sm:py-2.5 text-center text-slate-600 dark:text-slate-400">{r.groupScore||'-'}</td>
                            <td className="px-2 sm:px-4 py-1.5 sm:py-2.5 text-center font-bold text-sm sm:text-lg text-[#004030] dark:text-[#D8C3A5]">{r.finalScore||'-'}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  <div className="px-4 sm:px-5 py-2 border-t border-slate-100 dark:border-slate-700">
                    <button onClick={()=>setDetailGroup(detailGroup===gName?null:gName)} className="text-[10px] sm:text-xs text-[#004030] dark:text-[#D8C3A5] hover:underline">
                      {detailGroup===gName?'▼':'▶'} {t.results_by_criterion}
                    </button>
                    {detailGroup===gName&&<div className="mt-2 sm:mt-3 overflow-x-auto hide-scrollbar w-full">
                      <table className="w-full text-[10px] sm:text-xs min-w-[500px]"><thead><tr className="bg-slate-100 dark:bg-slate-700"><th className="px-2 sm:px-3 py-1.5 sm:py-2 text-left">{t.results_student}</th>
                        {store.criteria.map(c=><th key={c.id} className="px-2 sm:px-3 py-1.5 sm:py-2 text-center">{lang==='zh'?c.name_zh:c.name_en}</th>)}</tr></thead>
                      <tbody className="divide-y divide-slate-100 dark:divide-slate-700">
                        {sorted.map(r=><tr key={r.student.student_id}><td className="px-2 sm:px-3 py-1 sm:py-1.5">{lang==='zh'?r.student.name_zh:r.student.name_en}</td>
                          {store.criteria.map(c=><td key={c.id} className="px-2 sm:px-3 py-1 sm:py-1.5 text-center font-mono">{r.criterionDetail[c.id]}</td>)}</tr>)}
                      </tbody></table>
                    </div>}
                  </div>
                </div>);
              })}
            </>}
          </div>}

          {adminTab==='ta'&&isProf&&<div className="space-y-4">
            <div className="bg-white dark:bg-slate-800 rounded-2xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700">
              <h3 className="font-serif font-bold text-base sm:text-lg text-[#004030] dark:text-[#D8C3A5] mb-3 sm:mb-4">{t.admin_ta_title}</h3>
              <div className="p-2.5 sm:p-3 bg-[#004030]/5 dark:bg-[#D8C3A5]/5 rounded-xl mb-4 flex items-center justify-between">
                <div className="flex items-center gap-2 sm:gap-3">
                  <span className="w-7 h-7 sm:w-8 sm:h-8 rounded-full bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] flex items-center justify-center text-xs font-bold">P</span>
                  <div>
                    <p className="text-xs sm:text-sm font-medium text-[#004030] dark:text-[#D8C3A5]">{(store.users.find(u=>u.role==='professor')||{}).name||'Professor'}</p>
                    <p className="text-[10px] sm:text-xs text-slate-400">ID: {(store.users.find(u=>u.role==='professor')||{}).id||'prof'} · {t.admin_ta_prof_note}</p>
                  </div>
                </div>
              </div>

              <div className="space-y-2 mb-4">
                {store.users.filter(u=>u.role==='ta').length===0&&<p className="text-xs sm:text-sm text-slate-400 text-center py-3 sm:py-4">{t.admin_ta_none}</p>}
                {store.users.filter(u=>u.role==='ta').map(ta=>(
                  <div key={ta.id} className="p-2.5 sm:p-3 bg-slate-50 dark:bg-slate-700/50 rounded-xl flex items-center justify-between border border-slate-200 dark:border-slate-600">
                    <div className="flex items-center gap-2 sm:gap-3">
                      <span className="w-7 h-7 sm:w-8 sm:h-8 rounded-full bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 flex items-center justify-center text-xs font-bold">TA</span>
                      <div>
                        <p className="text-xs sm:text-sm font-medium text-slate-700 dark:text-slate-300">{ta.name}</p>
                        <p className="text-[10px] sm:text-xs text-slate-400">ID: {ta.id}</p>
                      </div>
                    </div>
                    <button onClick={()=>{showConfirmDialog(t.admin_ta_remove_confirm, ()=>updateStore({users:store.users.filter(u=>u.id!==ta.id)}))}}
                      className="text-[10px] sm:text-xs text-red-400 hover:text-red-600 px-2 py-1">{t.admin_ta_remove}</button>
                  </div>
                ))}
              </div>

              <div className="p-3 sm:p-4 border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-xl">
                <p className="text-xs sm:text-sm font-medium text-slate-600 dark:text-slate-300 mb-2 sm:mb-3">{t.admin_ta_add}</p>
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-2 sm:gap-3">
                  <input ref={newTaNameRef} type="text" placeholder={t.admin_ta_name_ph} className="px-2 sm:px-3 py-1.5 sm:py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-xs sm:text-sm focus:ring-2 focus:ring-[#004030] focus:outline-none"/>
                  <input ref={newTaIdRef} type="text" placeholder={t.admin_ta_id_ph} className="px-2 sm:px-3 py-1.5 sm:py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-xs sm:text-sm focus:ring-2 focus:ring-[#004030] focus:outline-none"/>
                  <input ref={newTaPwRef} type="text" placeholder={t.admin_ta_pw_ph} className="px-2 sm:px-3 py-1.5 sm:py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-xs sm:text-sm focus:ring-2 focus:ring-[#004030] focus:outline-none"/>
                </div>
                <button onClick={()=>{
                  const name = newTaNameRef.current?.value?.trim();
                  const id = newTaIdRef.current?.value?.trim();
                  const pw = newTaPwRef.current?.value?.trim();
                  if(!name||!id||!pw){showAlert(lang==='zh'?'請填寫完整':'Please fill all fields');return}
                  if(store.users.find(u=>u.id===id)){showAlert(lang==='zh'?'帳號已存在':'Username already exists');return}
                  updateStore({users:[...store.users,{id,role:'ta',name,password:pw}]});
                  if(newTaNameRef.current) newTaNameRef.current.value='';
                  if(newTaIdRef.current) newTaIdRef.current.value='';
                  if(newTaPwRef.current) newTaPwRef.current.value='';
                }}
                  className="mt-3 w-full sm:w-auto px-4 sm:px-5 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] rounded-lg text-xs sm:text-sm font-bold hover:opacity-90 transition">{t.admin_ta_add}</button>
              </div>
            </div>
          </div>}

          {adminTab==='gas'&&<div className="space-y-4 sm:space-y-6">
            <div className="bg-white dark:bg-slate-800 rounded-2xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700">
              <h2 className="font-serif font-bold text-lg sm:text-xl text-[#004030] dark:text-[#D8C3A5] mb-3 sm:mb-4">{t.deploy_title}</h2>
              <div className="space-y-3">
                {[
                  {step:t.deploy_step1,desc:t.deploy_step1_desc,icon:'1️⃣'},
                  {step:t.deploy_step2,desc:t.deploy_step2_desc,icon:'2️⃣'},
                  {step:t.deploy_step3,desc:t.deploy_step3_desc,icon:'3️⃣'},
                  {step:t.deploy_step4,desc:t.deploy_step4_desc,icon:'4️⃣'}
                ].map((s,i)=>(
                  <div key={i} className="flex gap-2 sm:gap-3 items-start">
                    <div className="w-7 h-7 sm:w-9 sm:h-9 rounded-full bg-[#004030]/10 dark:bg-[#D8C3A5]/10 flex items-center justify-center text-sm sm:text-base shrink-0">{s.icon}</div>
                    <div className="flex-1 pb-2 sm:pb-3 border-b border-slate-100 dark:border-slate-700 last:border-0">
                      <p className="font-bold text-[#004030] dark:text-[#D8C3A5] text-xs sm:text-sm">{s.step}</p>
                      <p className="text-slate-500 dark:text-slate-400 text-[10px] sm:text-xs mt-0.5 sm:mt-1">{s.desc}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div className="bg-white dark:bg-slate-800 rounded-2xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700 w-full overflow-hidden">
              <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-2 sm:gap-0 mb-3">
                <h3 className="font-serif font-bold text-base sm:text-lg text-[#004030] dark:text-[#D8C3A5]">Google Apps Script</h3>
                <button onClick={()=>{
                  copyTextToClipboard(GAS_SCRIPT, () => {
                    setGasCopied(true);
                    setTimeout(()=>setGasCopied(false), 2000);
                  });
                }}
                  className="px-3 sm:px-4 py-1.5 sm:py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] rounded-lg text-xs sm:text-sm font-bold flex items-center gap-1 sm:gap-2 hover:opacity-90 transition">
                  <IconCopy size={14}/>{gasCopied?t.gas_copied:t.gas_copy_script}
                </button>
              </div>
              <pre className="bg-slate-900 text-green-400 p-3 sm:p-4 rounded-xl text-[10px] sm:text-xs overflow-x-auto max-h-[300px] sm:max-h-[400px] overflow-y-auto leading-relaxed hide-scrollbar w-full">
                {GAS_SCRIPT}
              </pre>
            </div>
          </div>}
        </div>
      </div>
    );
  };

  const renderEvalView=()=>{
    const currentData = isCloudMode ? cloudData : {
      user: store.students.find(s=>s.student_id===currentUser),
      groupMembers: groups[store.students.find(s=>s.student_id===currentUser)?.group] || [],
      criteria: store.criteria,
      assignment: store.assignment
    };

    if(!currentData || !currentData.user) return null;
    
    return(
      <div className="min-h-screen pt-16 sm:pt-20 pb-12 px-3 sm:px-4">
        <div className="max-w-3xl mx-auto animate-fade-in">
          <div className="mb-4 sm:mb-6">
            <h1 className="font-serif font-bold text-xl sm:text-2xl text-[#004030] dark:text-[#D8C3A5]">{t.eval_title}</h1>
            {currentData.assignment && <p className="text-slate-500 text-xs sm:text-sm mt-1">{currentData.assignment}</p>}
            <p className="text-[10px] sm:text-sm text-slate-500 dark:text-slate-400 mt-2 bg-[#004030]/5 dark:bg-[#D8C3A5]/5 p-2 sm:p-3 rounded-xl">{t.eval_instruction}</p>
          </div>
          <div className="space-y-4 sm:space-y-8">
            {currentData.criteria.map((c,idx)=>(
              <div key={c.id} className="bg-white dark:bg-slate-800 rounded-2xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700 shadow-sm">
                <div className="mb-3 sm:mb-4">
                  <h2 className="font-serif font-bold text-base sm:text-lg text-[#004030] dark:text-[#D8C3A5] flex items-center gap-2">
                    <span className="w-6 h-6 sm:w-7 sm:h-7 rounded-full bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] text-[10px] sm:text-xs flex items-center justify-center font-bold">{idx+1}</span>
                    {lang==='zh'?c.name_zh:c.name_en}
                  </h2>
                  <p className="text-[10px] sm:text-sm text-slate-500 dark:text-slate-400 mt-1 ml-8 sm:ml-9">{lang==='zh'?c.desc_zh:c.desc_en}</p>
                </div>
                <RankingBoard key={c.id} members={currentData.groupMembers} currentUser={currentUser} lang={lang}
                  onRankingChange={r=>handleRankingChange(c.id,r)} existingRanking={null}/>
              </div>
            ))}
          </div>
          <div className="mt-6 sm:mt-8">
            <button onClick={handleSubmitEval} disabled={isSubmitting}
               className="w-full py-3 sm:py-4 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold text-base sm:text-lg rounded-xl hover:opacity-90 transition shadow-lg flex justify-center items-center disabled:opacity-70">
              {isSubmitting ? <IconSpinner size={24}/> : t.eval_submit}
            </button>
          </div>
        </div>
      </div>
    );
  };

  const renderSuccessView=()=>(
    <div className="min-h-screen flex items-center justify-center p-4 pt-16 sm:pt-20">
      <div className="text-center animate-fade-in">
        <div className="w-16 h-16 sm:w-20 sm:h-20 mx-auto mb-4 sm:mb-6 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center"><IconCheck size={32} className="sm:w-10 sm:h-10 text-green-600 dark:text-green-400"/></div>
        <h2 className="font-serif font-bold text-xl sm:text-2xl text-[#004030] dark:text-[#D8C3A5] mb-1 sm:mb-2">{t.eval_success}</h2>
        <p className="text-xs sm:text-sm text-slate-500">{lang==='zh'?'您可以安全關閉此頁面。':'You may safely close this page.'}</p>
      </div>
    </div>
  );

  return(
    <div className="flex flex-col min-h-screen">
      {renderHeader()}
      <main className="flex-1 w-full max-w-full overflow-hidden">
        {view==='login'&&renderLoginView()}
        {view==='admin_login'&&renderAdminLoginView()}
        {view==='admin'&&renderAdminView()}
        {view==='eval'&&renderEvalView()}
        {view==='success'&&renderSuccessView()}
      </main>
      {renderFooter()}

      {/* Global Dialog Modal */}
      {dialog && (
        <div className="fixed inset-0 z-[300] bg-black/50 flex items-center justify-center p-4">
          <div className="bg-white dark:bg-slate-800 p-5 sm:p-6 rounded-2xl max-w-sm w-full shadow-2xl border border-slate-200 dark:border-slate-700 animate-fade-in max-h-[85vh] overflow-y-auto hide-scrollbar">
            <p className="text-sm sm:text-base text-slate-700 dark:text-slate-300 mb-5 sm:mb-6 whitespace-pre-line">{dialog.msg}</p>
            <div className="flex gap-2 sm:gap-3 shrink-0">
              {dialog.type === 'confirm' && (
                <button onClick={()=>setDialog(null)} disabled={isSubmitting || isSendingEmails} className="flex-1 py-1.5 sm:py-2 border-2 border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-400 rounded-xl font-medium hover:bg-slate-50 dark:hover:bg-slate-700 transition text-xs sm:text-sm disabled:opacity-50">取消</button>
              )}
              <button onClick={()=>{ if(dialog.onConfirm) dialog.onConfirm(); setDialog(null); }} disabled={isSubmitting || isSendingEmails} className="flex-1 py-1.5 sm:py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] rounded-xl font-bold hover:opacity-90 transition text-xs sm:text-sm disabled:opacity-50">確定</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
