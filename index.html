// ─── GAS Script Template ───
const GAS_SCRIPT = `/**
 * Peer Evaluation — Google Apps Script
 * 同儕互評登入碼寄送 & 催繳自動通知
 * 
 * Sheet 欄位：student_id | name_zh | name_en | email | group | code | status
 */

const CONFIG = {
  SHEET_NAME: 'Sheet1',
  EVAL_URL: '{{EVAL_URL}}',
  SENDER_NAME: '{{COURSE}} Peer Evaluation',
  ASSIGNMENT_NAME: '{{ASSIGNMENT}}',
  DEADLINE: '{{DEADLINE}}',
  COURSE_NAME: '{{COURSE}}',
  PROF_NAME: 'Prof. Shihmin Lo',
  COL: { STUDENT_ID:0, NAME_ZH:1, NAME_EN:2, EMAIL:3, GROUP:4, CODE:5, STATUS:6 }
};

function sendLoginCodes() {
  const sheet = SpreadsheetApp.getActiveSpreadsheet().getSheets()[0];
  const data = sheet.getDataRange().getValues();
  const C = CONFIG.COL;
  let sent = 0;
  for (let i = 1; i < data.length; i++) {
    const [sid,nzh,nen,email,grp,code,status] = data[i];
    if (!email || !code) continue;
    const subject = '[' + CONFIG.COURSE_NAME + '] 同儕互評登入碼 Peer Evaluation Login Code';
    const html = '<div style="font-family:Segoe UI,Arial,sans-serif;max-width:600px;margin:0 auto;padding:20px">'
      + '<div style="background:#004030;color:#D8C3A5;padding:20px 24px;border-radius:12px 12px 0 0">'
      + '<h1 style="margin:0;font-size:20px">' + CONFIG.COURSE_NAME + ' — 同儕互評 Peer Evaluation</h1></div>'
      + '<div style="background:#fff;padding:24px;border:1px solid #e2e8f0;border-top:none">'
      + '<p>' + nzh + ' (' + nen + ') 同學您好，<br>Hi ' + nen + ',</p>'
      + '<p>請使用下方登入碼完成 <b>' + CONFIG.ASSIGNMENT_NAME + '</b> 的同儕互評。<br>'
      + '<span style="color:#64748b">Please use the code below for peer evaluation of <b>' + CONFIG.ASSIGNMENT_NAME + '</b>.</span></p>'
      + '<div style="background:#f8fafc;border:2px solid #004030;border-radius:12px;padding:20px;text-align:center;margin:20px 0">'
      + '<p style="margin:0 0 8px;color:#64748b;font-size:12px;letter-spacing:2px">LOGIN CODE 登入碼</p>'
      + '<p style="margin:0;font-family:Courier New,monospace;font-size:28px;font-weight:bold;color:#004030;letter-spacing:4px">' + code + '</p></div>'
      + '<p>組別 Group: <b>' + grp + '</b><br>截止 Deadline: <b>' + CONFIG.DEADLINE + '</b></p>'
      + '<a href="' + CONFIG.EVAL_URL + '" style="display:inline-block;background:#004030;color:#D8C3A5;padding:12px 28px;border-radius:8px;text-decoration:none;font-weight:bold">前往互評 Enter →</a>'
      + '<hr style="border:none;border-top:1px solid #e2e8f0;margin:20px 0">'
      + '<p style="color:#94a3b8;font-size:12px">⚠️ 此碼僅限您本人使用，互評採匿名制。This code is personal. Evaluations are anonymous.</p>'
      + '</div></div>';
    try { MailApp.sendEmail({to:email,subject:subject,htmlBody:html,name:CONFIG.SENDER_NAME}); sent++; Utilities.sleep(500); }
    catch(e) { Logger.log('Failed: ' + email + ' ' + e.message); }
  }
  SpreadsheetApp.getUi().alert('已寄出 ' + sent + ' 封 / ' + sent + ' emails sent');
}

function sendReminders() {
  const sheet = SpreadsheetApp.getActiveSpreadsheet().getSheets()[0];
  const data = sheet.getDataRange().getValues();
  const C = CONFIG.COL;
  let sent = 0;
  for (let i = 1; i < data.length; i++) {
    const [sid,nzh,nen,email,grp,code,status] = data[i];
    if (!email || !code || String(status).toLowerCase() === 'submitted') continue;
    const subject = '[提醒 Reminder] ' + CONFIG.COURSE_NAME + ' 同儕互評未完成';
    const html = '<div style="font-family:Segoe UI,Arial,sans-serif;max-width:600px;margin:0 auto;padding:20px">'
      + '<div style="background:#b45309;color:#fff;padding:20px 24px;border-radius:12px 12px 0 0">'
      + '<h1 style="margin:0;font-size:20px">⏰ 互評尚未完成 Evaluation Pending</h1></div>'
      + '<div style="background:#fff;padding:24px;border:1px solid #e2e8f0;border-top:none">'
      + '<p>' + nzh + ' (' + nen + ') 同學，</p>'
      + '<p>系統偵測到您尚未完成 <b>' + CONFIG.ASSIGNMENT_NAME + '</b> 的互評。<br>'
      + '<span style="color:#64748b">You have not yet completed peer evaluation for <b>' + CONFIG.ASSIGNMENT_NAME + '</b>.</span></p>'
      + '<p style="color:#dc2626;font-weight:bold">截止 Deadline: ' + CONFIG.DEADLINE + '</p>'
      + '<div style="background:#fffbeb;border:1px solid #f59e0b;border-radius:8px;padding:16px;margin:16px 0">'
      + '<p style="margin:0;color:#92400e;font-size:13px">登入碼 Code: <b style="font-family:monospace;font-size:16px;letter-spacing:2px">' + code + '</b></p></div>'
      + '<a href="' + CONFIG.EVAL_URL + '" style="display:inline-block;background:#b45309;color:#fff;padding:12px 28px;border-radius:8px;text-decoration:none;font-weight:bold">立即填寫 Complete Now →</a>'
      + '</div></div>';

// ─── Multi-format file parser ───
async function parseRosterFile(file) {
  const name = file.name.toLowerCase();
  const ext = name.split('.').pop();

  if (ext === 'csv' || ext === 'tsv') {
    const text = await file.text();
    return parseCSVText(text, ext === 'tsv' ? '\t' : ',');
  }
  if (ext === 'xlsx' || ext === 'xls') {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
    return normalizeRows(rows);
  }
  if (ext === 'docx') {
    const buf = await file.arrayBuffer();
    const result = await mammoth.extractRawText({arrayBuffer: buf});
    return parseTextToRoster(result.value);
  }
  if (ext === 'pdf') {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: buf}).promise;

    // Extract all text items with Y positions to reconstruct lines
    const allItems = [];
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const tc = await page.getTextContent();
      tc.items.forEach(item => {
        if (!item.str || !item.str.trim()) return;
        allItems.push({
          text: item.str,
          x: Math.round(item.transform[4]),
          y: Math.round(item.transform[5]),
          page: i
        });
      });
    }

    // Group by Y (same line = same Y, tolerance ±3)
    allItems.sort((a,b) => b.y - a.y || a.x - b.x); // top-down, left-right
    const lines = [];
    let currentLine = [];
    let currentY = null;

    allItems.forEach(item => {
      if (currentY === null || Math.abs(item.y - currentY) <= 6) {
        currentLine.push(item);
        if (currentY === null) currentY = item.y;
      } else {
        if (currentLine.length > 0) {
          currentLine.sort((a,b) => a.x - b.x);
          lines.push(currentLine.map(it => it.text).join(' '));
        }
        currentLine = [item];
        currentY = item.y;
      }
    });
    if (currentLine.length > 0) {
      currentLine.sort((a,b) => a.x - b.x);
      lines.push(currentLine.map(it => it.text).join(' '));
    }

    // Now parse the reconstructed lines
    return parsePdfLines(lines);
  }
  if (ext === 'txt') {
    const text = await file.text();
    return parseTextToRoster(text);
  }
  throw new Error('Unsupported format: ' + ext);
}

function parseCSVText(text, sep=',') {
  const lines = text.trim().split('\n').filter(l=>l.trim());
  if (lines.length < 2) return [];
  const header = lines[0].split(sep).map(h=>h.trim().toLowerCase().replace(/^["']|["']$/g,''));
  const rows = [];
  for (let i=1;i<lines.length;i++){
    const cols = lines[i].split(sep).map(c=>c.trim().replace(/^["']|["']$/g,''));
    const obj = {};
    header.forEach((h,idx) => obj[h] = cols[idx] || '');
    rows.push(obj);
  }
  return normalizeRows(rows);
}

const EMAIL_DOMAIN = '@mail1.ncnu.edu.tw';
function autoEmail(sid) { return 's' + String(sid).replace(/^s/i,'') + EMAIL_DOMAIN; }

function normalizeRows(rows) {
  // Highly flexible column name matching — supports any order, any naming convention
  // Each field has: exact matches, partial matches (substring), and regex patterns
  const colDefs = {
    student_id: {
      exact: ['student_id','studentid','id','學號','sid','no','number','sno','stdid','std_id','stuid','stu_id'],
      partial: ['學號','stdno','stuno','student','stuId'],
      regex: /^(s?tu(dent)?[_\s]?(id|no|num))|學號|id$/i
    },
    dept: {
      exact: ['dept','department','系所','系級','系所年級','科系','系別','class','grade','年級','系所班級','deptgrade','dept_grade'],
      partial: ['系所','系級','年級','科系','系別','dept','department','class','grade','major'],
      regex: /系|級|dept|department|major|class|grade/i
    },
    name_zh: {
      exact: ['name_zh','namezh','chinese_name','中文姓名','姓名','名字','name_chinese','中文名','cname','chname','ch_name','中文'],
      partial: ['中文','chinese','姓名','名字','cname'],
      regex: /中文|chinese|姓名|^名/i
    },
    name_en: {
      exact: ['name_en','nameen','english_name','英文姓名','英文名','name_english','ename','enname','en_name','英文','english'],
      partial: ['英文','english','ename','enname'],
      regex: /英文|english|^en[_\s]?name/i
    },
    email: {
      exact: ['email','e-mail','mail','電子郵件','信箱','電郵','e_mail','emailaddress','email_address'],
      partial: ['email','mail','信箱','電郵'],
      regex: /e?-?mail|信箱|電郵/i
    },
    group: {
      exact: ['group','grp','team','組別','小組','分組','group_name','groupname','組','team_name','teamname','group_no'],
      partial: ['組','group','team','grp'],
      regex: /組|group|team|grp/i
    }
  };

  function findCol(obj, fieldName) {
    const def = colDefs[fieldName];
    const keys = Object.keys(obj);
    const norm = s => s.toLowerCase().replace(/[_\s\-\.]/g, '');

    // Pass 1: exact match (after normalization)
    for (const candidate of def.exact) {
      const found = keys.find(k => norm(k) === norm(candidate));
      if (found) return obj[found];
    }
    // Pass 2: partial/substring match
    for (const candidate of def.partial) {
      const found = keys.find(k => norm(k).includes(norm(candidate)) || norm(candidate).includes(norm(k)));
      if (found) return obj[found];
    }
    // Pass 3: regex match
    if (def.regex) {
      const found = keys.find(k => def.regex.test(k));
      if (found) return obj[found];
    }
    return '';
  }

  // Disambiguation: if "name" column exists but no specific zh/en name columns,
  // try to split or detect language
  function hasAnyKey(obj, fieldName) {
    return String(findCol(obj, fieldName)).trim() !== '';
  }

  return rows.map(r => {
    const sid = String(findCol(r, 'student_id')).trim();
    const manualEmail = String(findCol(r, 'email')).trim();

    // Handle case where there's only a single "name"/"姓名" column
    let nameZh = String(findCol(r, 'name_zh')).trim();
    let nameEn = String(findCol(r, 'name_en')).trim();

    // If one is missing, check for a generic "name" column
    if (!nameZh || !nameEn) {
      const keys = Object.keys(r);
      const genericNameKey = keys.find(k => /^name$|^姓名$/i.test(k.trim()));
      if (genericNameKey) {
        const val = String(r[genericNameKey]).trim();
        // Detect if Chinese or English by character range
        const hasChinese = /[\u4e00-\u9fff]/.test(val);
        const hasLatin = /[a-zA-Z]{2,}/.test(val);
        if (!nameZh && hasChinese) nameZh = val;
        if (!nameEn && hasLatin) nameEn = val;
        if (!nameZh && !hasChinese) nameZh = val; // fallback
        if (!nameEn && !hasLatin) nameEn = val;
      }
    }

    return {
      student_id: sid,
      dept: String(findCol(r, 'dept')).trim(),
      name_zh: nameZh,
      name_en: nameEn,
      email: manualEmail || (sid ? autoEmail(sid) : ''),
      group: String(findCol(r, 'group')).trim()
    };
  }).filter(r => r.student_id && r.group);
}

function parsePdfLines(lines) {
  // Step 1: find header line
  const headerRe = /(學號|student.?id|sid).*(姓名|name).*(組|group)/i;
  const headerRe2 = /(系所|dept).*(學號|sid|id)/i;
  let headerIdx = -1;
  for (let i = 0; i < Math.min(lines.length, 20); i++) {
    if (headerRe.test(lines[i]) || headerRe2.test(lines[i])) {
      headerIdx = i;
      break;
    }
  }

  // Step 2: parse each line that contains a student ID (9-12 digit number)
  const students = [];
  const sidRe = /\b(\d{9,12})\b/;

  for (let i = (headerIdx >= 0 ? headerIdx + 1 : 0); i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const sidMatch = line.match(sidRe);
    if (!sidMatch) continue;

    const sid = sidMatch[1];
    const sidPos = line.indexOf(sid);

    // Everything before SID = dept (e.g., "國企系碩士班一年級")
    const beforeSid = line.substring(0, sidPos).trim();

    // Everything after SID = name_zh, name_en, group
    const afterSid = line.substring(sidPos + sid.length).trim();

    // Parse afterSid: find group pattern (G1, G2, etc.) at the end
    const groupMatch = afterSid.match(/\b(G\d+)\s*$/i);
    const group = groupMatch ? groupMatch[1] : '';
    const namesPart = groupMatch ? afterSid.substring(0, groupMatch.index).trim() : afterSid;

    // Split names: Chinese characters vs Latin characters
    let nameZh = '', nameEn = '';
    // Strategy: find boundary between Chinese and English text
    const zhMatch = namesPart.match(/^([\u4e00-\u9fff\u3400-\u4dbf]+)/);
    if (zhMatch) {
      nameZh = zhMatch[1];
      nameEn = namesPart.substring(zhMatch[0].length).trim();
    } else {
      // Maybe English first, Chinese later
      const parts = namesPart.split(/\s+/);
      parts.forEach(p => {
        if (/[\u4e00-\u9fff]/.test(p)) nameZh += (nameZh ? '' : '') + p;
        else nameEn += (nameEn ? ' ' : '') + p;
      });
    }

    if (sid && group) {
      students.push({
        student_id: sid,
        dept: beforeSid,
        name_zh: nameZh.trim(),
        name_en: nameEn.trim(),
        email: autoEmail(sid),
        group: group.toUpperCase()
      });
    }
  }
  return students;
}

function parseTextToRoster(text) {
  // Convert to lines and delegate to parsePdfLines
  const lines = text.split('\n').filter(l => l.trim());
  const result = parsePdfLines(lines);
  if (result.length > 0) return result;

  // Fallback for tab/comma separated data
  const parsed = [];
  for (const line of lines) {
    let parts;
    if (line.includes('\t')) parts = line.split('\t');
    else if (line.includes(',')) parts = line.split(',');
    else continue;
    parts = parts.map(p => p.trim()).filter(Boolean);
    if (parts.length < 3) continue;

    const sidIdx = parts.findIndex(p => /^\d{9,12}$/.test(p));
    if (sidIdx < 0) continue;

    const sid = parts[sidIdx];
    const groupIdx = parts.findIndex((p,i) => i !== sidIdx && /^G\d+$/i.test(p));
    const group = groupIdx >= 0 ? parts[groupIdx] : parts[parts.length - 1];

    const otherParts = parts.filter((_, i) => i !== sidIdx && i !== groupIdx);
    let dept = '', nameZh = '', nameEn = '';
    otherParts.forEach(p => {
      if (/[\u4e00-\u9fff].*[系班級]/.test(p)) dept = p;
      else if (/[\u4e00-\u9fff]/.test(p) && !nameZh) nameZh = p;
      else if (/[a-zA-Z]/.test(p) && !nameEn) nameEn = p;
    });

    parsed.push({
      student_id: sid, dept, name_zh: nameZh, name_en: nameEn,
      email: autoEmail(sid), group: group
    });
  }
  return parsed;
}

        messages: [{
          role: "user",
          content: `Extract peer evaluation rubric criteria from this document. Return ONLY valid JSON array, no markdown backticks. Format: [{"name_zh":"中文名","name_en":"English Name","desc_zh":"中文說明","desc_en":"English description"}]

Document:
${text.substring(0, 4000)}`
        }]
      })
    });
    const data = await resp.json();
    const raw = data.content?.map(c => c.text || '').join('') || '[]';
    const clean = raw.replace(/```json|```/g, '').trim();
    return JSON.parse(clean);
  } catch(e) {
    return [];
  }
}

function extractCriteriaLocal(text) {
  const criteria = [];
  const seen = new Set(); // Deduplicate by EC number across repeated pages

  // Pattern 1: EC1~ECn format (ITBM style)
  const ecPattern = /(?:[ivx]+\.\s*)?EC(\d+)\s*[：:]\s*(.+?)(?:的排名|的排序)[。.]?/gi;
  let match;
  while ((match = ecPattern.exec(text)) !== null) {
    const num = match[1];
    if (seen.has(num)) continue;
    seen.add(num);

    let desc = match[2].trim();
    desc = desc.replace(/^該組員在?/,'').replace(/^每次參與小組討論時[，,]?\s*/,'');

    const enMap = {
      '準備充分程度': 'Preparation Level',
      '準備充分': 'Preparation',
      '切中要點或有創意貢獻': 'Insight & Creative Contribution',
      '切中要點': 'Insight',
      '積極帶領討論或充份合作': 'Leadership & Collaboration',
      '帶領討論': 'Discussion Leadership',
      '書面報告整理與撰寫': 'Written Report Contribution',
      '主動且具體貢獻': 'Proactive Contribution',
      '團隊士氣或討論氣氛': 'Team Morale & Atmosphere',
      '正面且顯著提升': 'Positive Impact'
    };
    let nameEn = 'EC' + num, descEn = '';
    const zhShortMap = {};
    for (const [zh, en] of Object.entries(enMap)) {
      if (desc.includes(zh)) { nameEn = en; descEn = en + ' ranking'; zhShortMap.short = zh; break; }
    }
    const nameZh = zhShortMap.short || (desc.length > 12 ? desc.substring(0, 10) + '…' : desc);

    criteria.push({
      id: 'ec' + num + '_' + Date.now(),
      name_zh: 'EC' + num + ' ' + nameZh,
      name_en: 'EC' + num + ' ' + nameEn,
      desc_zh: '該組員' + (desc.startsWith('能') || desc.startsWith('對') ? '' : '在每次參與小組討論時，') + desc,
      desc_en: descEn || nameEn
    });
  }

  if (criteria.length > 0) return criteria;

  // Pattern 2: Numbered criteria with descriptions
  // e.g., "1. 準備充分程度" or "Criterion 1: Preparation level"
  const numberedPattern = /(?:^|\n)\s*(\d+)\s*[.、)）]\s*(.{4,60})/gm;
  const candidates = [];
  while ((match = numberedPattern.exec(text)) !== null) {
    const desc = match[2].trim();
    // Filter out non-criteria lines (too short, no evaluative language)
    if (/評|貢獻|表現|合作|能力|quality|contribution|effort|collaboration/i.test(desc)) {
      candidates.push(desc);
    }
  }
  if (candidates.length >= 2) {
    return candidates.map((desc, i) => ({
      id: 'cr' + (i+1) + '_' + Date.now(),
      name_zh: desc.substring(0, 20),
      name_en: 'Criterion ' + (i + 1),
      desc_zh: desc,
      desc_en: ''
    }));
  }

  return [];
}

const RankingBoard=({members,currentUser,lang,onRankingChange,existingRanking})=>{
  const t=dict[lang];const gs=members.length;
  const[slots,setSlots]=useState(()=>{
    const s={};for(let i=1;i<=gs;i++)s[i]=[];s['pool']=[];
    if(existingRanking&&Object.keys(existingRanking).length>0){
      const placed=new Set();
      Object.entries(existingRanking).forEach(([m,r])=>{if(s[r]){s[r].push(m);placed.add(m)}});
      members.forEach(m=>{if(!placed.has(m.student_id))s['pool'].push(m.student_id)});
    }else{s['pool']=members.map(m=>m.student_id)}
    return s;
  });
  const[dragItem,setDragItem]=useState(null);
  const[dragOverSlot,setDragOverSlot]=useState(null);
  const ghostRef=useRef(null);
  const memberMap=useMemo(()=>{const m={};members.forEach(s=>m[s.student_id]=s);return m},[members]);

  useEffect(()=>{
    const ranking={};
    Object.entries(slots).forEach(([slot,ids])=>{if(slot!=='pool')ids.forEach(id=>ranking[id]=parseInt(slot))});
    onRankingChange(slots['pool'].length===0?ranking:null);
  },[slots]);

  const moveItem=useCallback((itemId,from,to)=>{
    if(from===to)return;
    setSlots(prev=>{
      const next={};Object.keys(prev).forEach(k=>{next[k]=[...prev[k]]});
      next[from]=next[from].filter(id=>id!==itemId);
      if(!next[to])next[to]=[];
      next[to].push(itemId);
      return next;
    });
  },[]);

  const handleDragStart=(e,mid,from)=>{setDragItem({mid,from});e.dataTransfer.effectAllowed='move';e.target.classList.add('dragging')};
  const handleDragEnd=(e)=>{e.target.classList.remove('dragging');setDragItem(null);setDragOverSlot(null)};
  const handleDragOver=(e,sk)=>{e.preventDefault();e.dataTransfer.dropEffect='move';setDragOverSlot(sk)};
  const handleDragLeave=()=>setDragOverSlot(null);
  const handleDrop=(e,to)=>{e.preventDefault();setDragOverSlot(null);if(dragItem)moveItem(dragItem.mid,dragItem.from,to)};

  const handleTouchStart=(e,mid,from)=>{
    const touch=e.touches[0];setDragItem({mid,from});
    const g=document.createElement('div');
    const m=memberMap[mid];g.textContent=lang==='zh'?m.name_zh:m.name_en;
    g.style.cssText=`position:fixed;z-index:9999;pointer-events:none;padding:8px 16px;background:#004030;color:#D8C3A5;border-radius:8px;font-size:14px;font-weight:600;transform:translate(-50%,-50%);left:${touch.clientX}px;top:${touch.clientY}px;`;
    document.body.appendChild(g);ghostRef.current=g;
  };
  const handleTouchMove=(e)=>{
    e.preventDefault();const touch=e.touches[0];
    if(ghostRef.current){ghostRef.current.style.left=touch.clientX+'px';ghostRef.current.style.top=touch.clientY+'px'}
    const el=document.elementFromPoint(touch.clientX,touch.clientY);
    if(el){const se=el.closest('[data-slot]');setDragOverSlot(se?se.dataset.slot:null)}
  };
  const handleTouchEnd=()=>{
    if(ghostRef.current){document.body.removeChild(ghostRef.current);ghostRef.current=null}
    if(dragItem&&dragOverSlot!==null)moveItem(dragItem.mid,dragItem.from,dragOverSlot==='pool'?'pool':dragOverSlot);
    setDragItem(null);setDragOverSlot(null);
  };

  const renderChip=(mid,sk)=>{
    const m=memberMap[mid];if(!m)return null;
    const self=mid===currentUser;
    const dn=lang==='zh'?`${m.name_zh} (${m.name_en})`:`${m.name_en} (${m.name_zh})`;
    return(<div key={mid} draggable onDragStart={e=>handleDragStart(e,mid,sk)} onDragEnd={handleDragEnd}
      onTouchStart={e=>handleTouchStart(e,mid,sk)} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}
      className={`member-chip inline-flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium border
        ${self?'bg-[#004030]/10 dark:bg-[#D8C3A5]/10 border-[#004030]/30 dark:border-[#D8C3A5]/30 text-[#004030] dark:text-[#D8C3A5]'
        :'bg-white dark:bg-slate-700 border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-200'} shadow-sm hover:shadow-md`}>
      <span>{dn}</span>{self&&<span className="text-xs opacity-60">{t.eval_self_note}</span>}
    </div>);
  };

  const badgeCls=r=>r===1?'rank-1':r===2?'rank-2':r===3?'rank-3':'rank-other';

  return(<div className="space-y-4">
    <div data-slot="pool" onDragOver={e=>handleDragOver(e,'pool')} onDragLeave={handleDragLeave} onDrop={e=>handleDrop(e,'pool')}
      className={`rank-slot p-4 rounded-xl border-2 border-dashed transition-all ${dragOverSlot==='pool'?'drag-over border-[#004030] dark:border-[#D8C3A5]':'border-slate-300 dark:border-slate-600'} bg-slate-50 dark:bg-slate-800/50`}>
      <p className="text-xs font-semibold text-slate-400 dark:text-slate-500 mb-2 uppercase tracking-wider">{t.eval_pool}</p>
      <div className="flex flex-wrap gap-2 min-h-[40px]">
        {slots['pool'].map(id=>renderChip(id,'pool'))}
        {slots['pool'].length===0&&<span className="text-xs text-slate-400 italic">{lang==='zh'?'全部已排序 ✓':'All ranked ✓'}</span>}
      </div>
    </div>
    <div className="grid gap-2">
      {Array.from({length:gs},(_,i)=>i+1).map(rank=>(
        <div key={rank} data-slot={String(rank)} onDragOver={e=>handleDragOver(e,String(rank))} onDragLeave={handleDragLeave} onDrop={e=>handleDrop(e,String(rank))}
          className={`rank-slot flex items-center gap-3 p-3 rounded-xl border-2 transition-all ${dragOverSlot===String(rank)?'drag-over border-[#004030] dark:border-[#D8C3A5]':'border-slate-200 dark:border-slate-700'} bg-white dark:bg-slate-800`}>
          <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm shrink-0 ${badgeCls(rank)}`}>{rank}</div>
          <div className="flex flex-wrap gap-2 flex-1 min-h-[36px]">{(slots[rank]||[]).map(id=>renderChip(id,String(rank)))}</div>
        </div>
      ))}
    </div>
  </div>);
};

        <span className="hidden sm:inline">Architect:&nbsp;<a href={t.architect_url} target="_blank" rel="noopener noreferrer" className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors">{t.architect_name}</a></span>
      </span>
    </footer>
  );

  // Shared input class (fixes the 1-char-at-a-time bug by NOT using controlled state on every keystroke for these)
  const inputCls="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-800 dark:text-slate-200 focus:ring-2 focus:ring-[#004030] dark:focus:ring-[#D8C3A5] focus:outline-none";

  // ─── LOGIN VIEW ───
  const LoginView=()=>(
    <div className="min-h-screen flex items-center justify-center p-4 pt-20">
      <div className="w-full max-w-md animate-fade-in">
        <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-8 border border-slate-200 dark:border-slate-700">
          <div className="text-center mb-8">
            <div className="w-16 h-16 mx-auto mb-4 rounded-2xl bg-[#004030] dark:bg-[#D8C3A5]/10 flex items-center justify-center"><IconShield size={32} className="text-[#D8C3A5]"/></div>
            <h1 className="font-serif font-bold text-2xl text-[#004030] dark:text-[#D8C3A5]">{t.login_title}</h1>
            <p className="text-slate-500 dark:text-slate-400 text-sm mt-2">{t.subtitle}</p>
            {store.assignment&&<p className="text-[#004030] dark:text-[#D8C3A5] font-semibold mt-2">{store.assignment}</p>}
          </div>
          <div className="space-y-4">
            <div>
              <label className="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-1">{t.login_code_label}</label>
              <input type="text" defaultValue="" onBlur={e=>setLoginCode(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'){setLoginCode(e.target.value);setTimeout(handleLogin,50)}}}
                placeholder={t.login_code_ph} className={inputCls + " font-mono text-lg tracking-widest"}/>
            </div>
            {loginError&&<p className="text-red-500 text-sm">{loginError}</p>}
            <button onClick={()=>{const el=document.querySelector('input[type=text]');if(el)setLoginCode(el.value);setTimeout(handleLogin,50)}}
              className="w-full py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold rounded-xl hover:opacity-90 transition shadow-md">{t.login_btn}</button>
          </div>
          <div className="mt-6 pt-4 border-t border-slate-200 dark:border-slate-700 text-center">
            <button onClick={()=>setView('admin_login')} className="text-sm text-slate-400 hover:text-[#004030] dark:hover:text-[#D8C3A5] transition flex items-center gap-1 mx-auto"><IconKey size={14}/> {t.admin_btn}</button>
          </div>
        </div>
      </div>
    </div>
  );

  // ─── ADMIN LOGIN ───
  const AdminLoginView=()=>{
    const userRef=useRef(null);
    const pwRef=useRef(null);
    const doLogin=()=>{
      const uid=(userRef.current?.value||'').trim();
      const pw=(pwRef.current?.value||'').trim();
      // Check against all users (professor + TAs)
      const allUsers=store.users||[];
      // Also support legacy single-password login (backward compat)
      const found=allUsers.find(u=>u.id===uid&&u.password===pw);
      if(found){
        setAdminRole(found.role);setAdminUser(found);setView('admin');return;
      }
      // Fallback: if only password matches professor (no username needed for backward compat)
      const prof=allUsers.find(u=>u.role==='professor'&&u.password===pw);
      if(prof&&!uid){
        setAdminRole('professor');setAdminUser(prof);setView('admin');return;
      }
      alert(lang==='zh'?'帳號或密碼錯誤':'Invalid username or password');
    };
    return(
    <div className="min-h-screen flex items-center justify-center p-4 pt-20">
      <div className="w-full max-w-md animate-fade-in">
        <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-8 border border-slate-200 dark:border-slate-700">
          <h2 className="font-serif font-bold text-xl text-[#004030] dark:text-[#D8C3A5] mb-6">{t.admin_title}</h2>
          <div className="space-y-4">
            <div>
              <label className="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-1">{t.admin_user_label}</label>
              <input ref={userRef} type="text" defaultValue="" placeholder={t.admin_user_ph} className={inputCls}/>
            </div>
            <div>
              <label className="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-1">{t.admin_pw_label}</label>
              <input ref={pwRef} type="password" defaultValue="" onKeyDown={e=>{if(e.key==='Enter')doLogin()}}
                placeholder={t.admin_pw_ph} className={inputCls}/>
            </div>
            <button onClick={doLogin}
              className="w-full py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold rounded-xl hover:opacity-90 transition">{t.admin_enter}</button>
            <button onClick={()=>setView('login')} className="w-full py-2 text-sm text-slate-500 hover:text-[#004030] dark:hover:text-[#D8C3A5]">← {t.admin_back}</button>
          </div>
        </div>
      </div>
    </div>
  )};

  // ─── ADMIN VIEW ───
  const isProf=adminRole==='professor';
  const AdminView=()=>(
    <div className="min-h-screen pt-20 pb-12 px-4">
      <div className="max-w-5xl mx-auto animate-fade-in">
        <div className="flex items-center justify-between mb-6">
          <div className="flex items-center gap-3">
            <h1 className="font-serif font-bold text-2xl text-[#004030] dark:text-[#D8C3A5]">{t.admin_title}</h1>
            <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${isProf?'bg-[#004030]/10 text-[#004030] dark:bg-[#D8C3A5]/10 dark:text-[#D8C3A5]':'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400'}`}>
              {isProf?t.admin_role_prof:t.admin_role_ta}{adminUser?' · '+adminUser.name:''}
            </span>
          </div>
          <div className="flex items-center gap-3">
            {isProf&&<button onClick={()=>{if(confirm(t.admin_reset_confirm))resetStore()}} className="text-xs text-red-400 hover:text-red-600 transition">{t.admin_reset}</button>}
            <button onClick={()=>{setView('login');setAdminRole(null);setAdminUser(null)}} className="text-sm text-slate-500 hover:text-[#004030] dark:hover:text-[#D8C3A5]">← {t.admin_back}</button>
          </div>
        </div>
        {/* Tabs */}
        <div className="flex gap-1 mb-6 bg-slate-200 dark:bg-slate-700 rounded-xl p-1 overflow-x-auto">
          {[{key:'setup',icon:<IconClipboard size={16}/>,label:t.admin_tab_setup},
            {key:'codes',icon:<IconKey size={16}/>,label:t.admin_tab_codes},
            {key:'results',icon:<IconBarChart size={16}/>,label:t.admin_tab_results},
            ...(isProf?[{key:'ta',icon:<IconUsers size={16}/>,label:t.admin_tab_ta}]:[]),
            {key:'gas',icon:<IconCode size={16}/>,label:t.admin_tab_gas}
          ].map(tab=>(
            <button key={tab.key} onClick={()=>setAdminTab(tab.key)}
              className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-lg text-sm font-medium transition whitespace-nowrap px-3
                ${adminTab===tab.key?'bg-white dark:bg-slate-800 text-[#004030] dark:text-[#D8C3A5] shadow-sm':'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>
              {tab.icon} <span className="hidden sm:inline">{tab.label}</span>
            </button>
          ))}
        </div>

        {/* ═══ SETUP TAB ═══ */}
        {adminTab==='setup'&&<div className="space-y-6">
          {/* Assignment & Deadline & URL */}
          <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700 space-y-4">
            <div>
              <label className="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-1">{t.setup_assignment}</label>
              <input type="text" defaultValue={store.assignment} onBlur={e=>updateStore({assignment:e.target.value})} placeholder={t.setup_assignment_ph} className={inputCls}/>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label className="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-1">{t.setup_deadline}</label>
                <input type="text" defaultValue={store.deadline} onBlur={e=>updateStore({deadline:e.target.value})} placeholder={t.setup_deadline_ph} className={inputCls}/>
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-1">{t.setup_eval_url}</label>
                <input type="text" defaultValue={store.evalUrl} onBlur={e=>updateStore({evalUrl:e.target.value})} placeholder={t.setup_eval_url_ph} className={inputCls}/>
              </div>
            </div>
            <div className="mt-4">
              <label className="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-1">{t.setup_gas_url}</label>
              <input type="text" defaultValue={store.gasUrl} onBlur={e=>updateStore({gasUrl:e.target.value})} placeholder={t.setup_gas_url_ph} className={inputCls}/>
              <p className="text-xs text-slate-400 mt-1">{t.setup_gas_url_desc}</p>
            </div>
          </div>

          {/* CSV/Multi-format Upload */}
          <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700">
            <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-1 flex items-center gap-2"><IconUpload size={18}/>{t.setup_upload_roster}</h3>
            <p className="text-xs text-slate-500 dark:text-slate-400 mb-1">{t.setup_upload_roster_desc}</p>
            <p className="text-xs text-slate-400 dark:text-slate-500 mb-3 font-mono bg-slate-50 dark:bg-slate-700 p-2 rounded-lg">{t.setup_csv_format}</p>
            <input type="file" accept=".csv,.tsv,.xlsx,.xls,.docx,.pdf,.txt" onChange={handleRosterUpload}
              className="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:font-semibold file:bg-[#004030] file:text-white dark:file:bg-[#D8C3A5] dark:file:text-[#004030] hover:file:opacity-90 cursor-pointer"/>
            {parsing&&<p className="mt-2 text-sm text-amber-600 animate-pulse">{t.setup_parsing}</p>}
            {parseMsg&&<p className={`mt-2 text-sm flex items-center gap-1 ${parseMsg.ok?'text-green-600 dark:text-green-400':'text-red-500'}`}>{parseMsg.ok?<><IconCheck size={16}/>{t.setup_csv_loaded.replace('{n}',parseMsg.n).replace('{g}',parseMsg.g)}</>:<><IconX size={16}/>{t.setup_parse_error.replace('{e}',parseMsg.e)}</>}</p>}
          </div>

          {/* Roster Preview Table */}
          {store.students.length>0&&<div className="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 overflow-hidden">
            <div className="px-5 py-3 bg-[#004030]/5 dark:bg-[#D8C3A5]/5 border-b border-slate-200 dark:border-slate-700 flex flex-wrap justify-between items-center gap-2">
              <h3 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] flex items-center gap-2">
                <IconUsers size={18}/>{t.setup_roster_preview}
                <span className="text-xs font-normal text-slate-500 font-sans">({store.students.length}{lang==='zh'?'人':'p'}, {groupNames.length}{lang==='zh'?'組':'g'})</span>
              </h3>
              <div className="flex items-center gap-3">
                <span className="text-xs text-slate-400">{t.setup_roster_edit_email}</span>
                {isProf&&<button onClick={()=>{if(confirm(lang==='zh'?'確定清除學生名單？登入碼與提交記錄也會一併清除，此操作無法復原。':'Clear student roster? Login codes and submissions will also be cleared. This cannot be undone.'))updateStore({students:[],codes:{},submissions:{},groupScores:{}})}}
                  className="text-xs text-red-400 hover:text-red-600 transition">{t.setup_roster_clear}</button>}
              </div>
            </div>
            <div className="overflow-x-auto max-h-[420px] overflow-y-auto">
              <table className="w-full text-sm">
                <thead className="bg-slate-50 dark:bg-slate-700/50 sticky top-0">
                  <tr>
                    <th className="px-3 py-2.5 text-left font-medium text-slate-600 dark:text-slate-300 text-xs">#</th>
                    <th className="px-3 py-2.5 text-left font-medium text-slate-600 dark:text-slate-300 text-xs">{t.setup_roster_id}</th>
                    <th className="px-3 py-2.5 text-left font-medium text-slate-600 dark:text-slate-300 text-xs">{t.setup_roster_dept}</th>
                    <th className="px-3 py-2.5 text-left font-medium text-slate-600 dark:text-slate-300 text-xs">{t.setup_roster_name_zh}</th>
                    <th className="px-3 py-2.5 text-left font-medium text-slate-600 dark:text-slate-300 text-xs">{t.setup_roster_name_en}</th>
                    <th className="px-3 py-2.5 text-left font-medium text-slate-600 dark:text-slate-300 text-xs">{t.setup_roster_group}</th>
                    <th className="px-3 py-2.5 text-left font-medium text-slate-600 dark:text-slate-300 text-xs">{t.setup_roster_email}</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100 dark:divide-slate-700">
                  {store.students.map((s,idx)=>{
                    const isAuto=s.email===('s'+String(s.student_id).replace(/^s/i,'')+'@mail1.ncnu.edu.tw');
                    return(
                    <tr key={s.student_id} className="hover:bg-slate-50 dark:hover:bg-slate-700/50 group">
                      <td className="px-3 py-2 text-slate-400 text-xs">{idx+1}</td>
                      <td className="px-3 py-2 font-mono text-xs text-slate-700 dark:text-slate-300">{s.student_id}</td>
                      <td className="px-3 py-2 text-xs text-slate-500 dark:text-slate-400">{s.dept||'-'}</td>
                      <td className="px-3 py-2 text-slate-700 dark:text-slate-300">{s.name_zh}</td>
                      <td className="px-3 py-2 text-slate-700 dark:text-slate-300">{s.name_en}</td>
                      <td className="px-3 py-2">
                        <span className="px-2 py-0.5 rounded-full bg-[#004030]/10 dark:bg-[#D8C3A5]/10 text-[#004030] dark:text-[#D8C3A5] text-xs font-medium">{s.group}</span>
                      </td>
                      <td className="px-3 py-2">
                        <div className="flex items-center gap-1.5">
                          <input type="text" defaultValue={s.email}
                            onBlur={e=>{const newEmail=e.target.value.trim();if(newEmail&&newEmail!==s.email){
                              updateStore({students:store.students.map(st=>st.student_id===s.student_id?{...st,email:newEmail}:st)})
                            }}}
                            className="text-xs font-mono bg-transparent border-b border-transparent hover:border-slate-300 dark:hover:border-slate-600 focus:border-[#004030] dark:focus:border-[#D8C3A5] focus:outline-none text-slate-600 dark:text-slate-400 w-full min-w-[160px] py-0.5 transition"/>
                          <span className={`text-[10px] px-1.5 py-0.5 rounded-full shrink-0 ${isAuto?'bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400':'bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400'}`}>
                            {isAuto?t.setup_roster_auto:t.setup_roster_manual}
                          </span>
                        </div>
                      </td>
                    </tr>)
                  })}
                </tbody>
              </table>
            </div>
          </div>}

          {/* Group Scores */}
          {groupNames.length>0&&<div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700">
            <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-1">{t.setup_group_score}</h3>
            <p className="text-xs text-slate-400 dark:text-slate-500 mb-3">{t.setup_group_score_desc}</p>
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
              {groupNames.map(g=><div key={g}>
                <label className="text-xs font-medium text-slate-500 mb-1 block">{g} ({groups[g].length}{lang==='zh'?'人':'p'})</label>
                <input type="number" defaultValue={store.groupScores[g]||''} onBlur={e=>updateStore({groupScores:{...store.groupScores,[g]:e.target.value}})}
                  placeholder={t.setup_group_score_ph} className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-800 dark:text-slate-200 focus:ring-2 focus:ring-[#004030] focus:outline-none text-sm"/>
              </div>)}
            </div>
          </div>}

          {/* Criteria */}
          <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700">
            <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
              <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5]">{t.setup_criteria_title}</h3>
              <label className="inline-flex items-center gap-2 px-3 py-1.5 text-xs font-medium border border-dashed border-[#004030]/30 dark:border-[#D8C3A5]/30 rounded-lg text-[#004030] dark:text-[#D8C3A5] hover:bg-[#004030]/5 dark:hover:bg-[#D8C3A5]/5 cursor-pointer transition">
                <IconFile size={14}/>{criteriaImporting?(t.setup_criteria_importing):t.setup_criteria_import}
                <input type="file" accept=".csv,.tsv,.xlsx,.xls,.docx,.pdf,.txt" onChange={handleCriteriaImport} className="hidden"/>
              </label>
            </div>
            <p className="text-xs text-slate-400 mb-4">{t.setup_criteria_import_desc}</p>
            <div className="space-y-4">
              {store.criteria.map((c,idx)=>(
                <div key={c.id} className="p-4 bg-slate-50 dark:bg-slate-700/50 rounded-xl border border-slate-200 dark:border-slate-600">
                  <div className="flex justify-between items-start mb-3">
                    <span className="font-bold text-[#004030] dark:text-[#D8C3A5] text-sm">#{idx+1}</span>
                    {isProf&&<button onClick={()=>removeCriterion(c.id)} className="text-red-400 hover:text-red-600 text-xs">{t.setup_remove}</button>}
                  </div>
                  <div className="space-y-2">
                    <div>
                      <label className="text-xs text-slate-400 mb-0.5 block">{lang==='zh'?'名稱':'Name'}</label>
                      <input key={c.id+'name'+lang} defaultValue={lang==='zh'?c.name_zh:c.name_en}
                        onBlur={e=>updateCriterion(c.id,lang==='zh'?'name_zh':'name_en',e.target.value)}
                        placeholder={lang==='zh'?t.setup_criterion_zh:t.setup_criterion_en}
                        className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-sm focus:ring-2 focus:ring-[#004030] focus:outline-none text-slate-800 dark:text-slate-200"/>
                    </div>
                    <div>
                      <label className="text-xs text-slate-400 mb-0.5 block">{lang==='zh'?'說明（Rubric）':'Description (Rubric)'}</label>
                      <input key={c.id+'desc'+lang} defaultValue={lang==='zh'?c.desc_zh:c.desc_en}
                        onBlur={e=>updateCriterion(c.id,lang==='zh'?'desc_zh':'desc_en',e.target.value)}
                        placeholder={lang==='zh'?t.setup_criterion_desc_zh:t.setup_criterion_desc_en}
                        className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-sm focus:ring-2 focus:ring-[#004030] focus:outline-none text-slate-800 dark:text-slate-200"/>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <button onClick={addCriterion} className="mt-4 px-4 py-2 border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-xl text-sm text-slate-500 hover:border-[#004030] hover:text-[#004030] dark:hover:border-[#D8C3A5] dark:hover:text-[#D8C3A5] transition w-full">{t.setup_add_criterion}</button>
          </div>

          {/* Weight Range */}
          <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700">
            <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-3">{t.setup_weight_range}</h3>
            <div className="flex gap-4 items-center">
              <div><label className="text-xs text-slate-500 mb-1 block">{t.setup_weight_min}</label>
                <input type="number" step="0.05" defaultValue={store.weightMin} onBlur={e=>updateStore({weightMin:parseFloat(e.target.value)||0.55})}
                  className="w-24 px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-sm text-center font-mono text-slate-800 dark:text-slate-200 focus:ring-2 focus:ring-[#004030] focus:outline-none"/></div>
              <span className="text-slate-400 text-lg mt-5">~</span>
              <div><label className="text-xs text-slate-500 mb-1 block">{t.setup_weight_max}</label>
                <input type="number" step="0.05" defaultValue={store.weightMax} onBlur={e=>updateStore({weightMax:parseFloat(e.target.value)||1.45})}
                  className="w-24 px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-sm text-center font-mono text-slate-800 dark:text-slate-200 focus:ring-2 focus:ring-[#004030] focus:outline-none"/></div>
              <span className="text-slate-400 text-sm mt-5">×</span>
            </div>
          </div>

          <button onClick={()=>{saveStore(store);setSavedMsg(t.setup_saved);setTimeout(()=>setSavedMsg(''),2000)}}
            className="w-full py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold rounded-xl hover:opacity-90 transition shadow-md">{t.setup_save}</button>
          {savedMsg&&<p className="text-center text-green-600 dark:text-green-400 text-sm">{savedMsg}</p>}
        </div>}

        {/* ═══ CODES TAB ═══ */}
        {adminTab==='codes'&&<div className="space-y-4">
          <div className="flex flex-wrap gap-3">
            <button onClick={handleGenerateCodes} className="px-5 py-2.5 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-xl hover:opacity-90 transition flex items-center gap-2 text-sm"><IconRefresh size={16}/>{t.codes_generate}</button>
            {store.gasUrl ? (

        <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 max-w-md w-full shadow-2xl animate-fade-in border border-slate-200 dark:border-slate-700">
          <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-3">{t.eval_confirm_title}</h3>
          <p className="text-slate-600 dark:text-slate-400 text-sm mb-6">{t.eval_confirm_msg}</p>
          <div className="mb-6 space-y-3 max-h-60 overflow-y-auto">
            {store.criteria.map(c=>{
              const ranking=evalRankings[c.id];if(!ranking)return null;
              const cal=calibrateRanks(ranking,gm.length);
              const sorted=Object.entries(cal).sort((a,b)=>a[1]-b[1]);
              return(<div key={c.id} className="text-sm">
                <p className="font-medium text-[#004030] dark:text-[#D8C3A5] mb-1">{lang==='zh'?c.name_zh:c.name_en}</p>
                <div className="flex flex-wrap gap-1.5">{sorted.map(([sid,rank])=>{
                  const m=store.students.find(s=>s.student_id===sid);
                  return(<span key={sid} className="text-xs bg-slate-100 dark:bg-slate-700 px-2 py-1 rounded-lg">
                    <span className="font-bold text-[#004030] dark:text-[#D8C3A5]">{rank}</span>{' '}{lang==='zh'?m?.name_zh:m?.name_en}
                  </span>)
                })}</div>
              </div>)
            })}
          </div>
          <div className="flex gap-3">
            <button onClick={()=>setShowConfirm(false)} className="flex-1 py-2.5 border-2 border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-400 rounded-xl font-medium hover:bg-slate-50 dark:hover:bg-slate-700 transition text-sm">{t.eval_confirm_no}</button>
            <button onClick={confirmSubmit} className="flex-1 py-2.5 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] rounded-xl font-bold hover:opacity-90 transition text-sm">{t.eval_confirm_yes}</button>
          </div>
        </div>
      </div>}
    </div>
  )};

  // ─── SUCCESS VIEW ───
  const SuccessView=()=>(
    <div className="min-h-screen flex items-center justify-center p-4 pt-20">
      <div className="text-center animate-fade-in">
        <div className="w-20 h-20 mx-auto mb-6 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center"><IconCheck size={40} className="text-green-600 dark:text-green-400"/></div>
        <h2 className="font-serif font-bold text-2xl text-[#004030] dark:text-[#D8C3A5] mb-2">{t.eval_success}</h2>
        <p className="text-slate-500">{lang==='zh'?'您可以安全關閉此頁面。':'You may safely close this page.'}</p>
      </div>
    </div>
  );

  return(
    <div className="flex flex-col min-h-screen">
      <Header/>
      <main className="flex-1">
        {view==='login'&&<LoginView/>}
        {view==='admin_login'&&<AdminLoginView/>}
        {view==='admin'&&<AdminView/>}
        {view==='eval'&&<EvalView/>}
        {view==='success'&&<SuccessView/>}
      </main>
      <Footer/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
